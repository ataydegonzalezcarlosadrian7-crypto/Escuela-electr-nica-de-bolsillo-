<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ElectroMaster PRO | Ruta Eléctrica</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        :root {
            --primary: #3b82f6;
            --success: #58cc02;
            --error: #ff4b4b;
            --bg: #0f172a;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg);
            color: #f1f5f9;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .map-wrapper {
            position: relative;
            width: 100%;
            padding: 60px 0 200px 0;
            background: radial-gradient(circle at 50% 20%, #1e293b 0%, #0f172a 100%);
        }

        .cable-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .level-node {
            position: relative;
            width: 75px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.4rem;
            color: white;
            z-index: 10;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-bottom: 60px;
            cursor: pointer;
        }

        .node-active { background-color: #3b82f6; box-shadow: 0 6px 0 #1d4ed8; }
        .node-active:active { transform: translateY(4px); box-shadow: 0 2px 0 #1d4ed8; }
        .node-done { background-color: #58cc02; box-shadow: 0 6px 0 #46a302; }
        .node-locked { background-color: #334155; box-shadow: 0 6px 0 #1e293b; color: #64748b; cursor: not-allowed; }

        .current-ring {
            position: absolute;
            inset: -10px;
            border: 4px dashed #3b82f6;
            border-radius: 50%;
            animation: rotate-ring 8s linear infinite;
        }

        @keyframes rotate-ring {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .feedback-panel {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translate(-50%, 100%);
            width: 100%;
            max-width: 448px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: white;
        }
        .feedback-show { transform: translate(-50%, 0); }

        .ad-banner-bottom {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 448px;
            background: #1e293b;
            padding: 8px;
            border-top: 1px solid #334155;
            z-index: 30;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70px;
        }
        
        .quiz-scroll {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .quiz-scroll::-webkit-scrollbar { display: none; }

        .option-btn {
            transition: all 0.2s ease;
        }
        .option-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen border-x border-slate-800 shadow-2xl relative bg-slate-950">

    <!-- HEADER STATS -->
    <nav class="sticky top-0 z-40 bg-slate-950/95 backdrop-blur-md border-b border-slate-800 p-4">
        <div class="flex justify-between items-center max-w-sm mx-auto">
            <div class="flex items-center gap-2">
                <i class="fas fa-bolt text-yellow-400 text-xl"></i>
                <span id="xp-val" class="font-black text-white text-lg">0 XP</span>
            </div>
            <div class="flex items-center gap-2 bg-slate-900 px-4 py-1.5 rounded-full border border-slate-700 cursor-pointer active:bg-slate-800" onclick="showLifeModal()">
                <i class="fas fa-heart text-red-500"></i>
                <span id="lives-val" class="font-black text-red-500 text-lg">5</span>
                <i class="fas fa-plus-circle text-blue-500 text-xs ml-1"></i>
            </div>
        </div>
    </nav>

    <!-- MAP VIEW -->
    <main id="view-map" class="min-h-screen overflow-y-auto pb-32">
        <div class="map-wrapper" id="map-content">
            <svg class="cable-svg" id="cable-path">
                <path d="" fill="none" stroke="#334155" stroke-width="8" stroke-linecap="round" stroke-dasharray="15,10" />
            </svg>
            <div id="nodes-container" class="flex flex-col items-center w-full"></div>
        </div>
    </main>

    <!-- QUIZ VIEW -->
    <main id="view-quiz" class="hidden fixed inset-0 z-50 bg-slate-950 p-6 flex flex-col">
        <div class="flex items-center gap-4 mb-4">
            <button onclick="confirmExit()" class="text-slate-500 text-2xl p-2 active:text-white"><i class="fas fa-times"></i></button>
            <div class="flex-grow bg-slate-800 h-3 rounded-full overflow-hidden">
                <div id="quiz-bar" class="bg-blue-500 h-full transition-all duration-700" style="width: 0%"></div>
            </div>
        </div>
        
        <div id="question-container" class="flex-grow flex flex-col justify-start pt-4 overflow-y-auto quiz-scroll"></div>

        <div class="mt-4 pb-24">
            <button id="btn-check" class="w-full py-5 bg-slate-800 text-slate-500 rounded-2xl font-black uppercase tracking-widest transition" disabled>Comprobar</button>
        </div>

        <div id="feedback-panel" class="feedback-panel p-8 z-[60] border-t-8 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
            <div class="flex items-start gap-4 mb-8">
                <div id="fb-icon-box" class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl text-white shrink-0">
                    <i id="fb-icon" class="fas"></i>
                </div>
                <div class="flex-grow">
                    <h3 id="fb-title" class="font-black text-2xl mb-1 italic"></h3>
                    <p id="fb-desc" class="font-bold text-base leading-snug opacity-90"></p>
                </div>
            </div>
            <button id="btn-next" class="w-full py-5 text-white rounded-2xl font-black uppercase tracking-widest shadow-xl transition active:scale-95">Continuar</button>
        </div>
    </main>

    <!-- MODAL TIENDA -->
    <div id="life-modal" class="fixed inset-0 z-[100] bg-black/90 hidden items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] w-full max-w-sm text-center shadow-2xl">
            <div class="text-red-500 text-6xl mb-4"><i class="fas fa-heart"></i></div>
            <h2 class="text-2xl font-black mb-1 text-white italic uppercase">Batería Agotada</h2>
            
            <div id="timer-box" class="mb-6 p-4 bg-slate-950 rounded-2xl border border-slate-800">
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-1">Recarga en camino</p>
                <p id="timer-display" class="text-blue-400 font-bold text-2xl font-mono">30:00</p>
            </div>

            <div class="space-y-3 mb-6">
                <form action="https://www.paypal.com/ncp/payment/V2J2E7EYWRR2U" method="post" target="_blank" class="w-full">
                    <input class="w-full py-4 bg-[#FFD140] text-black font-black rounded-2xl cursor-pointer shadow-[0_4px_0_#d4af37] uppercase text-sm active:translate-y-1 active:shadow-none transition" type="submit" value="COMPRAR 5 VIDAS ($100)" />
                </form>

                <button onclick="watchAdForLife()" class="w-full py-4 bg-slate-800 text-blue-400 font-black rounded-2xl border-2 border-blue-500/30 flex items-center justify-center gap-2 text-sm active:bg-slate-700">
                    <i class="fas fa-video"></i> RECARGAR 1 VIDA (ANUNCIO)
                </button>
            </div>
            
            <button onclick="document.getElementById('life-modal').style.display='none'" class="text-slate-500 font-bold hover:text-white uppercase text-xs tracking-widest p-2">Cerrar</button>
        </div>
    </div>

    <!-- ADSTERRA BANNER -->
    <div class="ad-banner-bottom">
        <div id="ad-container-bottom"></div>
        <script type="text/javascript">
            // Script de carga diferida para no bloquear UI
            window.addEventListener('load', () => {
                const script = document.createElement('script');
                script.type = 'text/javascript';
                script.src = 'https://www.highperformanceformat.com/31c7e982c489babec109bba8d12f5afe/invoke.js';
                
                window.atOptions = {
                    'key' : '31c7e982c489babec109bba8d12f5afe',
                    'format' : 'iframe',
                    'height' : 60,
                    'width' : 468,
                    'params' : {}
                };
                document.getElementById('ad-container-bottom').appendChild(script);
            });
        </script>
    </div>

    <script>
    const PREGUNTAS_BANCO = [
        { id: 1, q: "¿Qué partícula del átomo tiene carga negativa?", options: ["Protón", "Neutrón", "Electrón", "Positrón"], correct: 2, why: "El electrón posee carga negativa y orbita el núcleo." },
        { id: 2, q: "¿Dónde se encuentran los protones en un átomo?", options: ["Órbitas", "Núcleo", "Nube electrónica", "Exterior"], correct: 1, why: "Protones y neutrones forman el núcleo central estable." },
        { id: 3, q: "¿Qué ocurre cuando un átomo pierde un electrón?", options: ["Se vuelve neutro", "Carga positiva (Ion+)", "Carga negativa (Ion-)", "Explota"], correct: 1, why: "Al perder carga negativa, el balance resulta en un Ion positivo." },
        { id: 4, q: "Material que permite el libre paso de electrones:", options: ["Aislante", "Conductor", "Semiconductor", "Vidrio"], correct: 1, why: "Los conductores tienen electrones libres en su capa de valencia." },
        { id: 5, q: "Ejemplo de un excelente aislante eléctrico:", options: ["Cobre", "Oro", "Porcelana", "Aluminio"], correct: 2, why: "La porcelana tiene una resistencia altísima al flujo eléctrico." },
        { id: 6, q: "¿Qué es la corriente eléctrica?", options: ["Voltaje estático", "Flujo de electrones", "Resistencia", "Calor"], correct: 1, why: "Es el movimiento ordenado de cargas a través de un conductor." },
        { id: 7, q: "Unidad de medida de la Corriente Eléctrica:", options: ["Voltio", "Ohmio", "Amperio", "Vatio"], correct: 2, why: "El Amperio (A) cuantifica la intensidad del flujo." },
        { id: 8, q: "Unidad de medida de la Tensión o Voltaje:", options: ["Amperio", "Voltio", "Julio", "Hertz"], correct: 1, why: "El Voltio (V) mide la diferencia de potencial." },
        { id: 9, q: "Unidad de medida de la Resistencia:", options: ["Amperio", "Voltio", "Ohmio", "Faradio"], correct: 2, why: "El Ohmio (Ω) mide la oposición al paso de corriente." },
        { id: 10, q: "La Ley de Ohm establece la relación entre:", options: ["V, I, R", "P, T, V", "R, C, L", "I, P, W"], correct: 0, why: "Establece que V = I × R." },
        { id: 11, q: "Si sube el voltaje y la resistencia se mantiene:", options: ["I baja", "I sube", "I es igual", "R desaparece"], correct: 1, why: "A mayor presión eléctrica, fluye más corriente (proporcional)." },
        { id: 12, q: "Si sube la resistencia y el voltaje es constante:", options: ["I sube", "I baja", "I se detiene", "V baja"], correct: 1, why: "La resistencia frena el flujo; son inversamente proporcionales." },
        { id: 13, q: "Fórmula para calcular Potencia Eléctrica:", options: ["P = V / I", "P = V * I", "P = R * I", "P = V + I"], correct: 1, why: "Vatios = Voltios x Amperios (Ley de Watt)." },
        { id: 14, q: "¿En qué unidad se mide la Potencia Eléctrica?", options: ["Vatio (Watt)", "HP", "Lumen", "Ohmio"], correct: 0, why: "El Watt (W) es la unidad del Sistema Internacional." },
        { id: 15, q: "Un circuito cerrado permite que:", options: ["No pase nada", "Circule la corriente", "Se queme", "El voltaje sea 0"], correct: 1, why: "Requiere un camino continuo de ida y vuelta a la fuente." },
        { id: 16, q: "Un cortocircuito ocurre cuando:", options: ["R es infinita", "R es casi cero", "V es cero", "I es muy baja"], correct: 1, why: "Sin resistencia, la intensidad tiende a infinito, causando calor." },
        { id: 17, q: "¿Qué tipo de corriente entregan las pilas?", options: ["Alterna", "Continua", "Trifásica", "Pulsante"], correct: 1, why: "Las pilas mantienen una polaridad fija y estable (DC)." },
        { id: 18, q: "Tipo de corriente en los enchufes de casa:", options: ["Continua", "Alterna", "Solar", "Galvánica"], correct: 1, why: "La red eléctrica usa corriente alterna para transporte eficiente." },
        { id: 19, q: "¿Qué frecuencia tiene la AC en la mayoría de América?", options: ["50 Hz", "60 Hz", "100 Hz", "120 Hz"], correct: 1, why: "Se estandariza en 60 ciclos por segundo en la región." },
        { id: 20, q: "¿Qué componente limita la corriente intencionalmente?", options: ["Cable", "Resistor", "Batería", "Interruptor"], correct: 1, why: "Los resistores se usan para controlar niveles de corriente." },
        { id: 21, q: "Un voltímetro se conecta en:", options: ["Serie", "Paralelo", "Tierra", "No importa"], correct: 1, why: "Para medir la diferencia entre dos puntos sin interrumpir el flujo." },
        { id: 22, q: "Un amperímetro se conecta en:", options: ["Serie", "Paralelo", "Cualquier parte", "Puente"], correct: 0, why: "Debe ser parte del lazo para que la corriente pase a través de él." },
        { id: 23, q: "¿Es seguro tocar circuitos con manos mojadas?", options: ["Sí, si es bajo V", "No, el agua conduce", "Sólo con guantes", "Depende del clima"], correct: 1, why: "El agua reduce la resistencia de la piel, aumentando el riesgo." },
        { id: 24, q: "El fusible protege el circuito de:", options: ["Bajo voltaje", "Sobrecorriente", "Humedad", "Luz solar"], correct: 1, why: "Se funde cuando la corriente excede el límite seguro." },
        { id: 25, q: "¿Cuál es la función de un interruptor?", options: ["Medir voltaje", "Abrir o cerrar el circuito", "Aumentar corriente", "Reducir resistencia"], correct: 1, why: "Controla mecánicamente la continuidad del circuito." },
        { id: 26, q: "¿Qué es un Bit en electrónica digital?", options: ["Unidad de carga", "Unidad de información", "Un microchip", "Un cable"], correct: 1, why: "Es el estado mínimo (0 o 1) de información binaria." },
        { id: 27, q: "Componente que almacena carga en campo eléctrico:", options: ["Resistor", "Inductor", "Capacitor", "Diodo"], correct: 2, why: "El capacitor (condensador) almacena energía temporalmente." },
        { id: 28, q: "¿Qué hace un Diodo?", options: ["Amplifica", "Permite flujo en un solo sentido", "Genera energía", "Mide ohmios"], correct: 1, why: "Actúa como una válvula de una sola vía para electrones." },
        { id: 29, q: "Representación de un '1' lógico común:", options: ["0 Voltios", "5 Voltios", "-5 Voltios", "Infinito"], correct: 1, why: "En lógica TTL, 5V suele representar el estado Alto (High)." },
        { id: 30, q: "Un transistor puede funcionar como:", options: ["Solo cable", "Interruptor o Amplificador", "Solo batería", "Lámpara"], correct: 1, why: "Es el pilar de la electrónica moderna por su versatilidad." },
        { id: 31, q: "Un potenciómetro es un:", options: ["Motor", "Resistor variable", "Sensor de luz", "Generador"], correct: 1, why: "Permite ajustar la resistencia girando un eje." },
        { id: 32, q: "Símbolo de la unidad de medida de frecuencia:", options: ["Hz", "V", "W", "Ω"], correct: 0, why: "Hertz (Hz) indica ciclos por segundo." },
        { id: 33, q: "Un LED es un diodo que:", options: ["Frena el paso", "Emite luz", "Calienta el aire", "Detecta radio"], correct: 1, why: "Light Emitting Diode transforma electricidad en fotones." },
        { id: 34, q: "Circuito que convierte AC en DC:", options: ["Oscilador", "Rectificador", "Inversor", "Transformador"], correct: 1, why: "Usa diodos para 'enderezar' la corriente alterna." },
        { id: 35, q: "La energía eléctrica consumida se mide en:", options: ["Amperios", "kWh", "Voltios/hora", "Vatios/segundo"], correct: 1, why: "Kilovatios-hora es la medida estándar de facturación." },
        { id: 36, q: "Componente que se opone a cambios de corriente:", options: ["Resistor", "Inductor", "Capacitor", "Diodo"], correct: 1, why: "La bobina (inductor) almacena energía en campo magnético." },
        { id: 37, q: "¿Qué significa AC/DC?", options: ["Alterna/Continua", "Alta/Baja", "Activa/Directa", "Aérea/Cableada"], correct: 0, why: "Describe los dos tipos fundamentales de flujo eléctrico." },
        { id: 38, q: "Si R1=10 y R2=10 en serie, la total es:", options: ["5 Ω", "10 Ω", "20 Ω", "0 Ω"], correct: 2, why: "En serie, las resistencias se suman directamente." },
        { id: 39, q: "Si R1=10 y R2=10 en paralelo, la total es:", options: ["5 Ω", "10 Ω", "20 Ω", "100 Ω"], correct: 0, why: "En paralelo de valores iguales, la total es la mitad." },
        { id: 40, q: "Dispositivo que cambia el nivel de voltaje AC:", options: ["Motor", "Transformador", "Batería", "Alternador"], correct: 1, why: "Usa inducción para subir o bajar la tensión." }
    ];

    let state = {
        xp: parseInt(localStorage.getItem('em_xp')) || 0,
        lives: parseInt(localStorage.getItem('em_lives')) || 5,
        progress: parseInt(localStorage.getItem('em_progress')) || 1,
        lastDeath: parseInt(localStorage.getItem('em_last_death')) || 0,
        selected: null,
        activeQ: null
    };

    function save() {
        localStorage.setItem('em_xp', state.xp);
        localStorage.setItem('em_lives', state.lives);
        localStorage.setItem('em_progress', state.progress);
        localStorage.setItem('em_last_death', state.lastDeath);
    }

    function updateStats() {
        document.getElementById('xp-val').innerText = `${state.xp} XP`;
        document.getElementById('lives-val').innerText = state.lives;
        checkRegeneration();
    }

    function checkRegeneration() {
        if (state.lives >= 5) {
            document.getElementById('timer-box').classList.add('hidden');
            return;
        }
        const now = Date.now();
        const waitTime = 30 * 60 * 1000;
        const diff = now - state.lastDeath;

        if (diff >= waitTime) {
            state.lives++;
            state.lastDeath = state.lives < 5 ? Date.now() : 0;
            save();
            updateStats();
        } else {
            document.getElementById('timer-box').classList.remove('hidden');
            const remaining = waitTime - diff;
            const m = Math.floor(remaining / 60000);
            const s = Math.floor((remaining % 60000) / 1000);
            document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }
    }

    function renderMap() {
        const container = document.getElementById('nodes-container');
        container.innerHTML = "";
        const nodesData = [];

        PREGUNTAS_BANCO.forEach((q, idx) => {
            const isLocked = q.id > state.progress;
            const isDone = q.id < state.progress;
            const isCurrent = q.id === state.progress;
            // Zig-zag offset
            const offset = Math.sin(idx * 0.9) * 75;

            const nodeBtn = document.createElement('button');
            nodeBtn.className = `level-node ${isLocked ? 'node-locked' : (isDone ? 'node-done' : 'node-active')}`;
            nodeBtn.style.transform = `translateX(${offset}px)`;
            
            if (isCurrent) {
                nodeBtn.innerHTML = `<div class="current-ring"></div><i class="fas fa-bolt text-yellow-300"></i>`;
            } else if (isDone) {
                nodeBtn.innerHTML = `<i class="fas fa-check"></i>`;
            } else {
                nodeBtn.innerHTML = q.id;
            }

            nodeBtn.onclick = () => { if (!isLocked) startQuiz(q); };
            container.appendChild(nodeBtn);
            nodesData.push({el: nodeBtn, offset: offset});
        });

        // Delay para asegurar que el DOM esté listo para medir offsets
        setTimeout(() => drawCable(nodesData), 150);
    }

    function drawCable(nodes) {
        const path = document.querySelector('#cable-path path');
        const svg = document.getElementById('cable-path');
        const mapContent = document.getElementById('map-content');
        if(!mapContent || nodes.length === 0) return;
        
        svg.setAttribute('height', mapContent.scrollHeight);
        
        let d = "";
        const mid = svg.clientWidth / 2;
        
        nodes.forEach((n, i) => {
            const x = mid + n.offset;
            const y = n.el.offsetTop + 35;
            if (i === 0) {
                d += `M ${x} ${y}`;
            } else {
                const prevX = mid + nodes[i-1].offset;
                const prevY = nodes[i-1].el.offsetTop + 35;
                const cpY = (prevY + y) / 2;
                d += ` C ${prevX} ${cpY}, ${x} ${cpY}, ${x} ${y}`;
            }
        });
        path.setAttribute('d', d);
    }

    function startQuiz(q) {
        if(state.lives <= 0) return showLifeModal();
        state.activeQ = q;
        state.selected = null;
        
        document.getElementById('view-map').classList.add('hidden');
        document.getElementById('view-quiz').classList.remove('hidden');
        
        const container = document.getElementById('question-container');
        container.innerHTML = `
            <div class="animate-in fade-in slide-in-from-bottom-6 duration-500 w-full">
                <h2 class="text-2xl font-black text-white mb-10 text-center leading-tight drop-shadow-lg p-5 bg-slate-900/80 rounded-3xl border border-slate-700/50 shadow-inner">${q.q}</h2>
                <div class="space-y-4">
                    ${q.options.map((opt, i) => `
                        <button onclick="selectOpt(${i})" id="opt-${i}" class="option-btn w-full p-5 rounded-3xl border-2 border-slate-800 bg-slate-900/60 text-left font-bold text-slate-100 transition-all flex items-center gap-4 hover:border-slate-600">
                            <span class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-800 border border-slate-700 text-sm font-black text-slate-400 shrink-0">${String.fromCharCode(65+i)}</span>
                            <span class="flex-grow text-lg">${opt}</span>
                        </button>
                    `).join('')}
                </div>
            </div>
        `;
        document.getElementById('quiz-bar').style.width = `${(q.id / PREGUNTAS_BANCO.length) * 100}%`;
        
        const btn = document.getElementById('btn-check');
        btn.disabled = true;
        btn.className = "w-full py-5 bg-slate-800 text-slate-500 rounded-2xl font-black uppercase tracking-widest";
    }

    function selectOpt(idx) {
        state.selected = idx;
        document.querySelectorAll('.option-btn').forEach(b => {
            b.classList.remove('border-blue-500', 'bg-blue-950/40', 'text-blue-100');
            b.classList.add('border-slate-800', 'text-slate-100');
        });
        const sel = document.getElementById(`opt-${idx}`);
        sel.classList.remove('border-slate-800');
        sel.classList.add('border-blue-500', 'bg-blue-950/40', 'text-blue-100');
        
        const btn = document.getElementById('btn-check');
        btn.disabled = false;
        btn.className = "w-full py-5 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest shadow-[0_5px_0_#1d4ed8] active:translate-y-1 active:shadow-none transition-all";
    }

    document.getElementById('btn-check').onclick = () => {
        const isCorrect = state.selected === state.activeQ.correct;
        const panel = document.getElementById('feedback-panel');
        const iconBox = document.getElementById('fb-icon-box');
        
        if (isCorrect) {
            panel.style.backgroundColor = "#d7ffb8";
            panel.style.borderColor = "#58cc02";
            iconBox.style.backgroundColor = "#58cc02";
            document.getElementById('fb-icon').className = "fas fa-check";
            document.getElementById('fb-title').innerText = "¡IMPRESIONANTE!";
            document.getElementById('fb-title').style.color = "#46a302";
            document.getElementById('fb-desc').innerText = state.activeQ.why;
            document.getElementById('fb-desc').style.color = "#46a302";
            state.xp += 15;
            if(state.activeQ.id === state.progress) state.progress++;
            confetti({ particleCount: 80, spread: 80, origin: { y: 0.8 }, colors: ['#58cc02', '#ffffff'] });
        } else {
            panel.style.backgroundColor = "#ffdfe0";
            panel.style.borderColor = "#ff4b4b";
            iconBox.style.backgroundColor = "#ff4b4b";
            document.getElementById('fb-icon').className = "fas fa-bolt";
            document.getElementById('fb-title').innerText = "¡CORTO CIRCUITO!";
            document.getElementById('fb-title').style.color = "#ea2b2b";
            document.getElementById('fb-desc').innerText = `La respuesta correcta era: ${state.activeQ.options[state.activeQ.correct]}`;
            document.getElementById('fb-desc').style.color = "#ea2b2b";
            if(state.lives === 5) state.lastDeath = Date.now();
            state.lives--;
        }
        
        save();
        updateStats();
        panel.classList.add('feedback-show');
        document.getElementById('btn-next').className = `w-full py-5 text-white rounded-2xl font-black uppercase tracking-widest shadow-lg ${isCorrect ? 'bg-[#58cc02] shadow-[#46a302]' : 'bg-[#ff4b4b] shadow-[#ea2b2b]'}`;
    };

    document.getElementById('btn-next').onclick = () => {
        document.getElementById('feedback-panel').classList.remove('feedback-show');
        exitQuiz();
    };

    function exitQuiz() {
        document.getElementById('view-quiz').classList.add('hidden');
        document.getElementById('view-map').classList.remove('hidden');
        renderMap();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function confirmExit() {
        if(confirm("¿Quieres abandonar? Se perderá el progreso de esta pregunta.")) exitQuiz();
    }

    function showLifeModal() {
        document.getElementById('life-modal').style.display = 'flex';
        checkRegeneration();
    }

    function watchAdForLife() {
        // Abrir link de Adsterra
        window.open("https://www.profitablecpmratenetwork.com/yt9pjia2en?key=4b88d642b785f6e2cd7ff0cc2b3b9470", "_blank");
        
        // Simulación de validación
        const btn = event.currentTarget;
        const originalHtml = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> VERIFICANDO...`;

        setTimeout(() => {
            if(state.lives < 5) {
                state.lives++;
                save();
                updateStats();
                document.getElementById('life-modal').style.display = 'none';
                confetti({ particleCount: 40, colors: ['#3b82f6', '#ffffff'], gravity: 1.2 });
            }
            btn.disabled = false;
            btn.innerHTML = originalHtml;
        }, 3000);
    }

    window.onload = () => {
        renderMap();
        updateStats();
        setInterval(checkRegeneration, 1000);
        
        // Redraw on resize
        window.onresize = () => {
            if(!document.getElementById('view-map').classList.contains('hidden')) {
                renderMap();
            }
        };
    };
    </script>
</body>
</html>
