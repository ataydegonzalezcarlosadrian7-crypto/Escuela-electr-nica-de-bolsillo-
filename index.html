<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ElectroMaster PRO | Ruta de Aprendizaje</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        :root {
            --primary: #58cc02;
            --secondary: #1cb0f6;
            --danger: #ff4b4b;
            --bg: #131f24;
            --card: #202f36;
            --border: #37464f;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* Estilo Duolingo 3D */
        .btn-3d {
            border-bottom: 5px solid rgba(0,0,0,0.3);
            transition: all 0.1s;
        }
        .btn-3d:active {
            border-bottom-width: 0;
            transform: translateY(5px);
        }

        /* Mapa de Nodos en Zig-Zag */
        .map-container {
            display: flex;
            flex-direction: column-reverse; 
            align-items: center;
            padding: 120px 0;
            gap: 40px;
            position: relative;
        }

        .node {
            width: 85px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .node-active {
            background: var(--primary);
            border-bottom: 8px solid #46a302;
            box-shadow: 0 0 25px rgba(88, 204, 2, 0.4);
        }

        .node-locked {
            background: #37464f;
            border-bottom: 8px solid #202f36;
            color: #52656d;
            cursor: not-allowed;
        }

        .node-completed {
            background: var(--secondary);
            border-bottom: 8px solid #1899d6;
        }

        /* Quiz Overlay */
        .quiz-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            display: none;
            flex-direction: column;
        }

        .option-card {
            background: var(--card);
            border: 2px solid var(--border);
            border-bottom: 6px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            text-align: left;
            font-weight: 800;
            transition: 0.1s;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .option-card.selected {
            background: rgba(28, 176, 246, 0.1);
            border-color: var(--secondary);
            color: var(--secondary);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.05); }
        }
        .current-anim {
            animation: bounce 2s infinite ease-in-out;
        }

        .feedback-panel {
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .feedback-panel.show {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <!-- Header Stats -->
    <nav class="fixed top-0 left-0 w-full h-16 bg-[#131f24] border-b-2 border-[#37464f] z-50 flex items-center justify-between px-6">
        <div class="flex items-center gap-3">
            <i class="fas fa-bolt text-orange-500 text-xl"></i>
            <span id="xp-count" class="font-black text-orange-500 text-lg">0</span>
        </div>
        <div class="flex items-center gap-4">
            <div onclick="openStore()" class="flex items-center gap-2 bg-[#202f36] px-4 py-1.5 rounded-2xl border-b-2 border-[#37464f] cursor-pointer">
                <i class="fas fa-heart text-red-500"></i>
                <span id="life-count" class="font-black text-red-500">5</span>
            </div>
        </div>
    </nav>

    <!-- Mapa -->
    <div id="game-map" class="overflow-y-auto h-screen">
        <div id="nodes-container" class="map-container"></div>
    </div>

    <!-- Pantalla Quiz -->
    <div id="quiz-screen" class="quiz-overlay">
        <div class="p-4 flex items-center gap-4">
            <button onclick="confirmExit()" class="text-gray-500 text-3xl px-2">×</button>
            <div class="h-4 bg-[#202f36] rounded-full flex-1 overflow-hidden">
                <div id="quiz-progress" class="h-full bg-[#58cc02] w-0 transition-all duration-500"></div>
            </div>
        </div>

        <div class="flex-1 px-6 py-8 overflow-y-auto">
            <h2 id="question-text" class="text-2xl font-black mb-8"></h2>
            <div id="options-container" class="grid gap-4"></div>
        </div>

        <!-- Check Area -->
        <div class="p-6 border-t-2 border-[#37464f]">
            <button id="check-btn" onclick="validateAnswer()" disabled class="btn-3d w-full bg-[#37464f] py-4 rounded-2xl font-black text-white text-lg opacity-50">
                COMPROBAR
            </button>
        </div>

        <!-- Feedback Panel -->
        <div id="feedback-panel" class="feedback-panel fixed bottom-0 left-0 w-full p-6 z-[110]">
            <div class="flex items-center gap-4 mb-4">
                <div id="feedback-icon" class="w-12 h-12 rounded-full flex items-center justify-center bg-white shadow-lg"></div>
                <div>
                    <h3 id="feedback-title" class="text-2xl font-black"></h3>
                    <p id="feedback-msg" class="font-bold opacity-80"></p>
                </div>
            </div>
            <button id="next-btn" class="btn-3d w-full py-4 rounded-2xl font-black text-lg text-white"></button>
        </div>
    </div>

    <!-- Modal Vidas -->
    <div id="store-modal" class="fixed inset-0 z-[200] bg-black/90 hidden flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-[#202f36] w-full max-w-sm rounded-3xl p-8 border-2 border-[#37464f] text-center shadow-2xl">
            <i class="fas fa-heart text-red-500 text-6xl mb-4"></i>
            <h2 class="text-2xl font-black mb-2">¡Necesitas vidas!</h2>
            <p class="text-gray-400 mb-8 font-bold">Espera a que se recarguen o mira un anuncio.</p>
            <button onclick="watchAd()" class="btn-3d bg-[#1cb0f6] w-full py-4 rounded-2xl font-black text-white mb-4">
                <i class="fas fa-play-circle"></i> VER ANUNCIO (+1 VIDA)
            </button>
            <button onclick="closeStore()" class="text-gray-500 font-bold">CERRAR</button>
        </div>
    </div>

    <script>
        // --- BASE DE DATOS REAL (Añade tus preguntas aquí) ---
        const USER_QUESTIONS = [
            { q: "¿Cuál es la unidad de medida de la tensión eléctrica?", a: ["Amperio", "Voltio", "Ohmio", "Watt"], correct: 1 },
            { q: "¿Qué instrumento mide la corriente eléctrica?", a: ["Voltímetro", "Vatímetro", "Amperímetro", "Ohmímetro"], correct: 2 },
            { q: "¿Qué componente limita el paso de la corriente?", a: ["Diodo", "Resistor", "Capacitor", "Inductor"], correct: 1 },
            { q: "La Ley de Ohm dice que V es igual a:", a: ["I / R", "I + R", "I * R", "R / I"], correct: 2 },
            { q: "¿Cuál es la unidad de potencia eléctrica?", a: ["Voltio", "Ohmio", "Watt", "Amperio"], correct: 2 },
            { q: "¿Qué material es un excelente conductor?", a: ["Vidrio", "Madera", "Cobre", "Plástico"], correct: 2 },
            { q: "¿Qué partícula tiene carga negativa?", a: ["Protón", "Neutrón", "Electrón", "Fotón"], correct: 2 },
            { q: "¿Cómo se conectan las luces en una casa?", a: ["En serie", "En paralelo", "Cruzadas", "Lineales"], correct: 1 },
            { q: "¿Qué dispositivo protege contra sobrecargas?", a: ["Interruptor", "Fusible", "Enchufe", "Cable"], correct: 1 },
            { q: "¿Cuál es el símbolo de la resistencia?", a: ["V", "A", "Ω", "W"], correct: 2 }
        ];

        // Llenar dinámicamente hasta 500 basado en tus preguntas reales (repitiendo o variando)
        const QUESTIONS_DB = [];
        for(let i=0; i<500; i++) {
            const baseQ = USER_QUESTIONS[i % USER_QUESTIONS.length];
            QUESTIONS_DB.push({
                id: i + 1,
                q: i < USER_QUESTIONS.length ? baseQ.q : `Desafío Maestro #${i+1}: ${baseQ.q}`,
                a: baseQ.a,
                correct: baseQ.correct
            });
        }

        // --- ESTADO ---
        let state = {
            xp: parseInt(localStorage.getItem('em_xp')) || 0,
            lives: parseInt(localStorage.getItem('em_lives')) || 5,
            progress: parseInt(localStorage.getItem('em_progress')) || 1,
            currentQuiz: null,
            selectedOption: null
        };

        // --- RENDER MAPA ---
        function renderMap() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            
            for (let i = 1; i <= 500; i++) {
                const node = document.createElement('div');
                const isLocked = i > state.progress;
                const isCompleted = i < state.progress;
                const isCurrent = i === state.progress;

                node.className = `node ${isLocked ? 'node-locked' : (isCompleted ? 'node-completed' : 'node-active')} ${isCurrent ? 'current-anim' : ''}`;
                
                // Efecto Zig-Zag
                const offset = Math.sin(i * 0.8) * 60; 
                node.style.transform = `translateX(${offset}px)`;

                node.innerHTML = isLocked ? '<i class="fas fa-lock"></i>' : (isCompleted ? '<i class="fas fa-check"></i>' : `<b>${i}</b>`);
                
                if (!isLocked) node.onclick = () => openQuiz(i);
                container.appendChild(node);
            }
        }

        // --- LÓGICA QUIZ ---
        function openQuiz(id) {
            if (state.lives <= 0) return openStore();
            
            state.currentQuiz = QUESTIONS_DB.find(q => q.id === id);
            state.selectedOption = null;
            
            document.getElementById('quiz-screen').style.display = 'flex';
            document.getElementById('question-text').innerText = state.currentQuiz.q;
            
            const optionsHtml = state.currentQuiz.a.map((opt, i) => `
                <button onclick="selectOption(${i})" class="option-card" data-idx="${i}">
                    <span class="w-8 h-8 rounded-lg border-2 border-inherit flex items-center justify-center text-xs">${i+1}</span>
                    ${opt}
                </button>
            `).join('');
            
            document.getElementById('options-container').innerHTML = optionsHtml;
            document.getElementById('check-btn').disabled = true;
            document.getElementById('check-btn').classList.add('opacity-50', 'bg-[#37464f]');
            document.getElementById('quiz-progress').style.width = `${(id / 500) * 100}%`;
        }

        function selectOption(idx) {
            state.selectedOption = idx;
            document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
            document.querySelector(`[data-idx="${idx}"]`).classList.add('selected');
            
            const btn = document.getElementById('check-btn');
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'bg-[#37464f]');
            btn.classList.add('bg-[#58cc02]');
        }

        function validateAnswer() {
            const isCorrect = state.selectedOption === state.currentQuiz.correct;
            const panel = document.getElementById('feedback-panel');
            const nextBtn = document.getElementById('next-btn');

            if (isCorrect) {
                panel.className = "feedback-panel fixed bottom-0 left-0 w-full p-6 bg-[#d7ffb8] text-[#58cc02] show z-[120]";
                document.getElementById('feedback-title').innerText = "¡Excelente!";
                document.getElementById('feedback-icon').innerHTML = '<i class="fas fa-check text-green-500 text-xl"></i>';
                nextBtn.className = "btn-3d w-full py-4 rounded-2xl font-black text-lg bg-[#58cc02] text-white";
                nextBtn.innerText = "CONTINUAR";
                nextBtn.onclick = handleSuccess;
                confetti({ particleCount: 40, spread: 60, origin: { y: 0.8 } });
            } else {
                state.lives--;
                save();
                updateStats();
                panel.className = "feedback-panel fixed bottom-0 left-0 w-full p-6 bg-[#ffdfe0] text-[#ff4b4b] show z-[120]";
                document.getElementById('feedback-title').innerText = "Incorrecto";
                document.getElementById('feedback-msg').innerText = `La respuesta era: ${state.currentQuiz.a[state.currentQuiz.correct]}`;
                document.getElementById('feedback-icon').innerHTML = '<i class="fas fa-times text-red-500 text-xl"></i>';
                nextBtn.className = "btn-3d w-full py-4 rounded-2xl font-black text-lg bg-[#ff4b4b] text-white";
                nextBtn.innerText = "ENTENDIDO";
                nextBtn.onclick = () => { closeQuiz(); if(state.lives <= 0) openStore(); };
            }
        }

        function handleSuccess() {
            if (state.currentQuiz.id === state.progress) {
                state.progress++;
                state.xp += 10;
                save();
                updateStats();
            }
            closeQuiz();
            renderMap();
        }

        function closeQuiz() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('feedback-panel').classList.remove('show');
        }

        function confirmExit() {
            if(confirm("¿Seguro que quieres salir?")) closeQuiz();
        }

        function openStore() { document.getElementById('store-modal').classList.remove('hidden'); }
        function closeStore() { document.getElementById('store-modal').classList.add('hidden'); }

        function watchAd() {
            window.open("https://www.google.com", "_blank"); // Cambiar por tu link de publicidad
            setTimeout(() => {
                state.lives = Math.min(state.lives + 1, 5);
                save();
                updateStats();
                closeStore();
            }, 2000);
        }

        function save() {
            localStorage.setItem('em_xp', state.xp);
            localStorage.setItem('em_lives', state.lives);
            localStorage.setItem('em_progress', state.progress);
        }

        function updateStats() {
            document.getElementById('xp-count').innerText = state.xp;
            document.getElementById('life-count').innerText = state.lives;
        }

        window.onload = () => {
            renderMap();
            updateStats();
            window.scrollTo(0, document.body.scrollHeight);
        };
    </script>
</body>
</html>
