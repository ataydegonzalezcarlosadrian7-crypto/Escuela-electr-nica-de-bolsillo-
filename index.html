    "opciones": ["Cuando explota", "Cuando la inductancia parásita cancela la capacitancia y el componente se vuelve inductivo", "Cuando la capacitancia es máxima", "Cuando se conecta a un cristal"],
    "respuesta": 1,
    "explicacion": "Por encima de esta frecuencia, el capacitor ya no actúa como tal debido a la ESL (Inductancia Serie Equivalente)."
  },
  {
    "id": 119,
    "nivel": "avanzado",
    "tema": "Ley de Ohm",
    "pregunta": "En una red de CA, si la impedancia es Z = 3 + j4 Ω, ¿cuál es el factor de potencia?",
    "opciones": ["0.6", "0.8", "1.0", "0.75"],
    "respuesta": 0,
    "explicacion": "|Z| = 5; FP = R / |Z| = 3 / 5 = 0.6."
  },
  {
    "id": 120,
    "nivel": "avanzado",
    "tema": "Seguridad eléctrica",
    "pregunta": "¿Cuál es la función del blindaje de Faraday en un equipo electrónico?",
    "opciones": ["Aislar del calor", "Proteger contra interferencias electromagnéticas externas (EMI)", "Aumentar el peso", "Evitar el contacto humano"],
    "respuesta": 1,
    "explicacion": "Una envolvente conductora conectada a tierra cancela los campos eléctricos en su interior."
  }
]
        let state = {
            xp: parseInt(localStorage.getItem('em_xp')) || 0,
            lives: parseInt(localStorage.getItem('em_lives')) || 5,
            progress: parseInt(localStorage.getItem('em_progress')) || 1,
            certified: localStorage.getItem('em_certified') === 'true',
            selectedOption: null,
            currentQuiz: null
        };

        function renderMap() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            QUESTIONS_DB.forEach((q, index) => {
                const i = index + 1;
                const node = document.createElement('div');
                const isLocked = i > state.progress;
                const isCompleted = i < state.progress;
                const isCurrent = i === state.progress;
                node.className = `node ${isLocked ? 'node-locked' : (isCompleted ? 'node-completed' : 'node-active')} ${isCurrent ? 'current-anim' : ''}`;
                node.style.transform = `translateX(${Math.sin(i * 0.85) * 55}px)`;
                if(i === 1) node.innerHTML += '<span class="level-tag">PRINCIPIANTE</span>';
                if(i === 16) node.innerHTML += '<span class="level-tag">TÉCNICO</span>';
                if(i === 36) node.innerHTML += '<span class="level-tag">MAESTRÍA</span>';
                node.innerHTML += isLocked ? '<i class="fas fa-lock text-sm"></i>' : (isCompleted ? '<i class="fas fa-check"></i>' : `<b>${i}</b>`);
                if (!isLocked) node.onclick = () => openQuiz(i);
                container.appendChild(node);
            });
            const gradNode = document.createElement('div');
            const gradLocked = state.progress <= 50;
            gradNode.className = `node ${gradLocked ? 'node-locked' : 'node-gold current-anim'} mt-10 mb-20`;
            gradNode.style.width = '100px'; gradNode.style.height = '100px';
            gradNode.innerHTML = `<i class="fas fa-graduation-cap text-4xl"></i>`;
            if(!gradLocked) gradNode.onclick = openGrad;
            container.appendChild(gradNode);
        }

        function openQuiz(id) {
            if (state.lives <= 0) return openStore();
            const q = QUESTIONS_DB.find(x => x.id === id);
            state.currentQuiz = q;
            state.selectedOption = null;

            document.getElementById('quiz-screen').style.display = 'flex';
            document.getElementById('category-label').innerText = q.cat;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('quiz-progress').style.width = `${(id / 50) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = ''; 

            q.a.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-card';
                btn.innerHTML = `
                    <span class="w-8 h-8 rounded-lg border-2 border-inherit flex items-center justify-center text-xs font-black">${String.fromCharCode(65 + index)}</span>
                    <span class="flex-1">${opt}</span>
                `;
                btn.onclick = () => {
                    state.selectedOption = index;
                    document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
                    btn.classList.add('selected');
                    const check = document.getElementById('check-btn');
                    check.disabled = false;
                    check.style.opacity = "1";
                    check.style.backgroundColor = "#58cc02";
                };
                container.appendChild(btn);
            });
            
            const checkBtn = document.getElementById('check-btn');
            checkBtn.disabled = true;
            checkBtn.style.opacity = "0.5";
            checkBtn.style.backgroundColor = "#37464f";
        }

        function validateAnswer() {
            const correct = state.selectedOption === state.currentQuiz.correct;
            const panel = document.getElementById('feedback-panel');
            const nextBtn = document.getElementById('next-btn');
            
            if (correct) {
                panel.style.backgroundColor = "#d7ffb8";
                document.getElementById('feedback-title').innerText = "¡CORRECTO!";
                document.getElementById('feedback-title').style.color = "#58cc02";
                document.getElementById('feedback-msg').innerText = "Excelente precisión técnica.";
                document.getElementById('feedback-icon').innerHTML = '<i class="fas fa-check text-green-600"></i>';
                nextBtn.className = "btn-3d w-full py-4 rounded-2xl font-black bg-[#58cc02] text-white";
                nextBtn.innerText = "CONTINUAR";
                nextBtn.onclick = () => {
                    if (state.currentQuiz.id === state.progress) { state.progress++; state.xp += 20; save(); }
                    closeQuiz(); renderMap();
                };
            } else {
                state.lives--; save(); updateStats();
                panel.style.backgroundColor = "#ffdfe0";
                document.getElementById('feedback-title').innerText = "INCORRECTO";
                document.getElementById('feedback-title').style.color = "#ff4b4b";
                document.getElementById('feedback-msg').innerText = "Solución: " + state.currentQuiz.a[state.currentQuiz.correct];
                document.getElementById('feedback-icon').innerHTML = '<i class="fas fa-times text-red-600"></i>';
                nextBtn.className = "btn-3d w-full py-4 rounded-2xl font-black bg-[#ff4b4b] text-white";
                nextBtn.innerText = "ENTENDIDO";
                nextBtn.onclick = () => { closeQuiz(); if(state.lives <= 0) openStore(); };
            }
            panel.classList.add('panel-active');
        }

        function save() { 
            localStorage.setItem('em_xp', state.xp); 
            localStorage.setItem('em_lives', state.lives); 
            localStorage.setItem('em_progress', state.progress); 
        }

        function updateStats() { 
            document.getElementById('xp-count').innerText = state.xp; 
            document.getElementById('life-count').innerText = state.lives; 
        }

        function closeQuiz() { 
            document.getElementById('quiz-screen').style.display='none'; 
            document.getElementById('feedback-panel').classList.remove('panel-active'); 
        }

        function openStore() { document.getElementById('store-modal').classList.remove('hidden'); }
        function closeStore() { document.getElementById('store-modal').classList.add('hidden'); }
        function openGrad() { document.getElementById('grad-modal').classList.remove('hidden'); }
        function closeGrad() { document.getElementById('grad-modal').classList.add('hidden'); }
        function confirmExit() { if(confirm("¿Seguro que quieres salir?")) closeQuiz(); }
        
        function watchAd() {
            window.open(SMART_LINK, "_blank");
            state.lives = Math.min(state.lives + 1, 5);
            save(); updateStats();
            closeStore();
        }

        window.onload = () => {
            renderMap(); updateStats();
            setTimeout(() => {
                const cur = document.querySelector('.current-anim');
                if(cur) cur.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 600);
        };
    </script>
</body>
</html>
