<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ElectroMaster PRO | Ruta de Aprendizaje</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        :root {
            --primary: #58cc02;
            --secondary: #1cb0f6;
            --danger: #ff4b4b;
            --bg: #131f24;
            --card: #202f36;
            --border: #37464f;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* Estilo Duolingo 3D */
        .btn-3d {
            border-bottom: 5px solid rgba(0,0,0,0.3);
            transition: all 0.1s;
        }
        .btn-3d:active {
            border-bottom-width: 0;
            transform: translateY(5px);
        }

        /* Mapa de Nodos en Zig-Zag */
        .map-container {
            display: flex;
            flex-direction: column-reverse; 
            align-items: center;
            padding: 120px 0;
            gap: 40px;
            position: relative;
        }

        .node {
            width: 85px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .node-active {
            background: var(--primary);
            border-bottom: 8px solid #46a302;
            box-shadow: 0 0 25px rgba(88, 204, 2, 0.4);
        }

        .node-locked {
            background: #37464f;
            border-bottom: 8px solid #202f36;
            color: #52656d;
            cursor: not-allowed;
        }

        .node-completed {
            background: var(--secondary);
            border-bottom: 8px solid #1899d6;
        }

        /* Quiz Overlay */
        .quiz-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            display: none;
            flex-direction: column;
        }

        .option-card {
            background: var(--card);
            border: 2px solid var(--border);
            border-bottom: 6px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            text-align: left;
            font-weight: 800;
            transition: 0.1s;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .option-card.selected {
            background: rgba(28, 176, 246, 0.1);
            border-color: var(--secondary);
            color: var(--secondary);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.05); }
        }
        .current-anim {
            animation: bounce 2s infinite ease-in-out;
        }

        .feedback-panel {
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .feedback-panel.show {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <!-- Header Stats -->
    <nav class="fixed top-0 left-0 w-full h-16 bg-[#131f24] border-b-2 border-[#37464f] z-50 flex items-center justify-between px-6">
        <div class="flex items-center gap-3">
            <i class="fas fa-bolt text-orange-500 text-xl"></i>
            <span id="xp-count" class="font-black text-orange-500 text-lg">0</span>
        </div>
        <div class="flex items-center gap-4">
            <div onclick="openStore()" class="flex items-center gap-2 bg-[#202f36] px-4 py-1.5 rounded-2xl border-b-2 border-[#37464f] cursor-pointer">
                <i class="fas fa-heart text-red-500"></i>
                <span id="life-count" class="font-black text-red-500">5</span>
            </div>
        </div>
    </nav>

    <!-- Mapa -->
    <div id="game-map" class="overflow-y-auto h-screen">
        <div id="nodes-container" class="map-container"></div>
    </div>

    <!-- Pantalla Quiz -->
    <div id="quiz-screen" class="quiz-overlay">
        <div class="p-4 flex items-center gap-4">
            <button onclick="confirmExit()" class="text-gray-500 text-3xl px-2">×</button>
            <div class="h-4 bg-[#202f36] rounded-full flex-1 overflow-hidden">
                <div id="quiz-progress" class="h-full bg-[#58cc02] w-0 transition-all duration-500"></div>
            </div>
        </div>

        <div class="flex-1 px-6 py-8 overflow-y-auto">
            <h2 id="question-text" class="text-2xl font-black mb-8"></h2>
            <div id="options-container" class="grid gap-4"></div>
        </div>

        <!-- Check Area -->
        <div class="p-6 border-t-2 border-[#37464f]">
            <button id="check-btn" onclick="validateAnswer()" disabled class="btn-3d w-full bg-[#37464f] py-4 rounded-2xl font-black text-white text-lg opacity-50">
                COMPROBAR
            </button>
        </div>

        <!-- Feedback Panel -->
        <div id="feedback-panel" class="feedback-panel fixed bottom-0 left-0 w-full p-6 z-[110]">
            <div class="flex items-center gap-4 mb-4">
                <div id="feedback-icon" class="w-12 h-12 rounded-full flex items-center justify-center bg-white shadow-lg"></div>
                <div>
                    <h3 id="feedback-title" class="text-2xl font-black"></h3>
                    <p id="feedback-msg" class="font-bold opacity-80"></p>
                </div>
            </div>
            <button id="next-btn" class="btn-3d w-full py-4 rounded-2xl font-black text-lg text-white"></button>
        </div>
    </div>

    <!-- Modal Vidas -->
    <div id="store-modal" class="fixed inset-0 z-[200] bg-black/90 hidden flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-[#202f36] w-full max-w-sm rounded-3xl p-8 border-2 border-[#37464f] text-center shadow-2xl">
            <i class="fas fa-heart text-red-500 text-6xl mb-4"></i>
            <h2 class="text-2xl font-black mb-2">¡Necesitas vidas!</h2>
            <p class="text-gray-400 mb-8 font-bold">Espera a que se recarguen o mira un anuncio.</p>
            <button onclick="watchAd()" class="btn-3d bg-[#1cb0f6] w-full py-4 rounded-2xl font-black text-white mb-4">
                <i class="fas fa-play-circle"></i> VER ANUNCIO (+1 VIDA)
            </button>
            <button onclick="closeStore()" class="text-gray-500 font-bold">CERRAR</button>
        </div>
    </div>

    <script>
        // --- BASE DE DATOS REAL (Añade tus preguntas aquí) ---
   const USER_QUESTIONS = [
     { id: 1, type: "multiple", q: "¿Qué partícula subatómica es la responsable del flujo de corriente en los metales?", options: ["Protón", "Neutrón", "Electrón", "Positrón"], correct: 2, why: "Los electrones de la capa de valencia tienen movilidad en los conductores metálicos, permitiendo el flujo eléctrico." },
  { id: 2, type: "fill", q: "La unidad de medida de la carga eléctrica es el ___", correct: "coulomb", why: "Un Coulomb equivale a aproximadamente 6.242 x 10^18 electrones." },
  { id: 3, type: "truefalse", q: "Dos cargas del mismo signo se atraen entre sí.", correct: false, why: "Según la ley de cargas, las cargas iguales se repelen y las opuestas se atraen." },
  { id: 4, type: "multiple", q: "¿Cuál es la constante de permitividad del vacío (ε0)?", options: ["8.85 x 10^-12 F/m", "9 x 10^9 N·m²/C²", "1.6 x 10^-19 C", "6.63 x 10^-34 J·s"], correct: 0, why: "La permitividad del vacío define la capacidad del campo eléctrico para permear el espacio libre." },
  { id: 5, type: "multiple", q: "Un material con una banda prohibida (band gap) muy ancha se clasifica como:", options: ["Conductor", "Semiconductor", "Aislante", "Superconductor"], correct: 2, why: "En los aislantes, la energía necesaria para que un electrón salte a la banda de conducción es demasiado alta." },
  { id: 6, type: "fill", q: "La región del espacio donde una carga experimenta una fuerza se llama campo ___", correct: "electrico", why: "El campo eléctrico es un campo vectorial que rodea a las cargas eléctricas." },
  { id: 7, type: "truefalse", q: "El oro es mejor conductor que la plata.", correct: false, why: "La plata tiene la resistividad más baja de todos los metales; el oro se usa por su resistencia a la corrosión." },
  { id: 8, type: "multiple", q: "¿Qué sucede con la resistencia de un conductor si su área transversal se duplica?", options: ["Se duplica", "Se cuadruplica", "Se reduce a la mitad", "No cambia"], correct: 2, why: "La resistencia es inversamente proporcional al área (R = ρ*L/A)." },
  { id: 9, type: "multiple", q: "La diferencia de potencial eléctrico también es conocida como:", options: ["Corriente", "Tensión", "Potencia", "Capacitancia"], correct: 1, why: "La tensión o voltaje es el trabajo por unidad de carga necesario para moverla entre dos puntos." },
  { id: 10, type: "fill", q: "Un material cuya resistencia cae a cero a temperaturas críticas se llama ___", correct: "superconductor", why: "La superconductividad permite el flujo de corriente sin pérdida de energía por calor." },
  { id: 11, type: "multiple", q: "¿Quién postuló que la fuerza entre dos cargas es proporcional al producto de sus cargas?", options: ["Ohm", "Coulomb", "Faraday", "Ampere"], correct: 1, why: "Charles-Augustin de Coulomb formuló la ley fundamental de la electrostática." },
  { id: 12, type: "truefalse", q: "Un rayo es un ejemplo de descarga electrostática a gran escala.", correct: true, why: "Es la nivelación de potencial entre nubes o nubes y tierra a través del aire ionizado." },
  { id: 13, type: "multiple", q: "La intensidad de campo eléctrico (E) se mide en:", options: ["V/m", "C/m", "A/s", "Ohm/m"], correct: 0, why: "Se define como Voltios por metro o Newtons por Coulomb (N/C)." },
  { id: 14, type: "fill", q: "El dispositivo capaz de almacenar carga eléctrica se denomina ___", correct: "capacitor", why: "O condensador, almacena energía en forma de campo eléctrico entre dos placas." },
  { id: 15, type: "multiple", q: "¿Cuál es la unidad de capacitancia?", options: ["Watt", "Henrio", "Faradio", "Tesla"], correct: 2, why: "El Faradio (F) representa un Coulomb de carga almacenado por un Voltio de diferencia de potencial." },
  { id: 16, type: "truefalse", q: "La ley de Gauss relaciona el flujo eléctrico con la carga encerrada.", correct: true, why: "Es una de las cuatro ecuaciones fundamentales de Maxwell." },
  { id: 17, type: "multiple", q: "El prefijo 'pico' (p) en electrónica representa:", options: ["10^-6", "10^-9", "10^-12", "10^-15"], correct: 2, why: "Muy común en capacitores (pF = picofaradios)." },
  { id: 18, type: "fill", q: "La facilidad de un material para permitir el flujo de corriente es la ___", correct: "conductancia", why: "Es el inverso de la resistencia y se mide en Siemens (S)." },
  { id: 19, type: "multiple", q: "Un átomo neutro que gana un electrón se convierte en:", options: ["Catión", "Anión", "Isótopo", "Nucleón"], correct: 1, why: "Al tener exceso de electrones negativos, se convierte en un ion negativo o anión." },
  { id: 20, type: "truefalse", q: "El vidrio es un excelente conductor eléctrico.", correct: false, why: "El vidrio es un aislante; sus electrones están fuertemente ligados a la estructura molecular." },
  { id: 21, type: "multiple", q: "¿Qué instrumento mide la carga eléctrica directamente?", options: ["Voltímetro", "Amperímetro", "Electrómetro", "Vatímetro"], correct: 2, why: "El electrómetro es un instrumento de alta impedancia diseñado para medir carga o voltajes estáticos." },
  { id: 22, type: "fill", q: "La energía por unidad de carga es el ___", correct: "voltio", why: "1 Voltio = 1 Julio / 1 Coulomb." },
  { id: 23, type: "multiple", q: "En un dieléctrico, la polarización es:", options: ["Flujo de corriente", "Alineación de dipolos", "Pérdida de electrones", "Aumento de temperatura"], correct: 1, why: "Las moléculas se orientan según el campo externo, aumentando la capacitancia." },
  { id: 24, type: "truefalse", q: "La resistencia de un cable aumenta con la temperatura en la mayoría de metales.", correct: true, why: "El aumento de vibraciones atómicas dificulta el paso de los electrones (coeficiente térmico positivo)." },
  { id: 25, type: "multiple", q: "La ley de Ohm relaciona:", options: ["V, I, P", "V, I, R", "P, R, t", "I, Q, t"], correct: 1, why: "V = I * R es la base del análisis de circuitos resistivos." },
  { id: 26, type: "fill", q: "La unidad de resistencia eléctrica es el ___", correct: "ohm", why: "Representado por la letra griega Omega (Ω)." },
  { id: 27, type: "multiple", q: "Si la resistividad del cobre es 1.72 x 10^-8 Ω·m, un cable más grueso tendrá:", options: ["Más resistividad", "Menos resistividad", "Misma resistividad", "Cero resistividad"], correct: 2, why: "La resistividad es una propiedad intrínseca del material, no depende de la forma." },
  { id: 28, type: "truefalse", q: "Un circuito abierto tiene resistencia infinita.", correct: true, why: "Al no haber conexión física, la oposición al paso de corriente es total." },
  { id: 29, type: "multiple", q: "¿Cuál es la velocidad de la luz en el vacío (aprox)?", options: ["300,000 km/s", "150,000 km/s", "1,000,000 km/s", "30,000 km/s"], correct: 0, why: "Es la velocidad límite a la que viajan las ondas electromagnéticas." },
  { id: 30, type: "fill", q: "El flujo de electrones en un solo sentido se llama corriente ___", correct: "continua", why: "La Corriente Continua (DC) no cambia de polaridad con el tiempo." },
  { id: 31, type: "multiple", q: "¿Qué componente se usa para ajustar manualmente la resistencia?", options: ["Termistor", "LDR", "Potenciómetro", "Varistor"], correct: 2, why: "El potenciómetro es una resistencia variable de tres terminales." },
  { id: 32, type: "truefalse", q: "Un protón tiene la misma cantidad de carga que un electrón pero de signo opuesto.", correct: true, why: "Ambos poseen la carga elemental de 1.602 x 10^-19 C." },
  { id: 33, type: "multiple", q: "La potencia eléctrica disipada en una resistencia es:", options: ["V / I", "I * R", "I² * R", "V * R"], correct: 2, why: "P = I² * R es la ley de Joule para el calor disipado." },
  { id: 34, type: "fill", q: "La unidad de potencia es el ___", correct: "watt", why: "1 Watt = 1 Julio por segundo." },
  { id: 35, type: "multiple", q: "¿Qué material se usa comúnmente como dieléctrico en capacitores de alta frecuencia?", options: ["Electrolítico", "Cerámica", "Papel", "Aire"], correct: 1, why: "La cerámica tiene bajas pérdidas y buena estabilidad a frecuencias elevadas." },
  { id: 36, type: "truefalse", q: "La densidad de corriente (J) es la corriente por unidad de volumen.", correct: false, why: "La densidad de corriente (J) es la corriente por unidad de área transversal." },
  { id: 37, type: "multiple", q: "El efecto piezoeléctrico genera electricidad a partir de:", options: ["Calor", "Luz", "Presión mecánica", "Magnetismo"], correct: 2, why: "Ciertos cristales como el cuarzo generan voltaje al deformarse físicamente." },
  { id: 38, type: "fill", q: "La constante de tiempo en un circuito RC es el producto de R por ___", correct: "c", why: "τ = R * C define la velocidad de carga y descarga." },
  { id: 39, type: "multiple", q: "Un aislante perfecto tendría una conductividad de:", options: ["Infinita", "1", "0", "100"], correct: 2, why: "Cero conductividad significa que no permite absolutamente ningún paso de portadores." },
  { id: 40, type: "truefalse", q: "El aire seco es un conductor a voltajes muy bajos.", correct: false, why: "El aire es aislante hasta que se supera su rigidez dieléctrica (aprox 3kV/mm)." },
  { id: 41, type: "multiple", q: "La permitividad relativa (εr) de un material también se llama:", options: ["Constante dieléctrica", "Factor de potencia", "Reactancia", "Inductancia"], correct: 0, why: "Indica cuántas veces aumenta la capacitancia respecto al vacío." },
  { id: 42, type: "fill", q: "El fenómeno de atracción de virutas de papel por un peine frotado es por ___", correct: "induccion", why: "Las cargas del peine inducen una redistribución de carga en el papel." },
  { id: 43, type: "multiple", q: "¿Cuántos electrones hay en un microcoulomb (μC)?", options: ["6.24 x 10^12", "1.6 x 10^-19", "6.24 x 10^18", "10^6"], correct: 0, why: "Es 10^-6 veces la carga de un Coulomb completo." },
  { id: 44, type: "truefalse", q: "Un cuerpo neutro no contiene ninguna carga eléctrica.", correct: false, why: "Contiene igual cantidad de cargas positivas y negativas que se anulan." },
  { id: 45, type: "multiple", q: "La superficie donde el potencial es constante se llama:", options: ["Isoterma", "Equipotencial", "Isóbara", "Gradiente"], correct: 1, why: "En una superficie equipotencial, no se realiza trabajo al mover una carga sobre ella." },
  { id: 46, type: "fill", q: "El flujo eléctrico total a través de una superficie cerrada es proporcional a la carga ___", correct: "encerrada", why: "Es el enunciado fundamental de la Ley de Gauss." },
  { id: 47, type: "multiple", q: "La rigidez dieléctrica se mide en:", options: ["Faradios/m", "Voltios/m", "Ohms/m", "Amperios/m"], correct: 1, why: "Es el campo eléctrico máximo que el material soporta antes de romperse." },
  { id: 48, type: "truefalse", q: "Los semiconductores intrínsecos son conductores perfectos a 0 Kelvin.", correct: false, why: "A 0 K se comportan como aislantes perfectos porque no hay energía térmica para liberar electrones." },
  { id: 49, type: "multiple", q: "¿Qué partícula tiene carga neutra?", options: ["Electrón", "Neutrón", "Protón", "Ion"], correct: 1, why: "El neutrón se encuentra en el núcleo y no posee carga eléctrica neta." },
  { id: 50, type: "fill", q: "La rama de la física que estudia las cargas en reposo es la ___", correct: "electrostatica", why: "Estudia campos eléctricos y potenciales producidos por cargas estáticas." },

  // --- BLOQUE 2: ANÁLISIS DE CIRCUITOS DC (51-100) ---
  { id: 51, type: "multiple", q: "Según la ley de nodos de Kirchhoff, la suma de corrientes que entran a un nodo es:", options: ["Igual a la corriente de fuente", "Igual a la suma de las que salen", "Cero", "Siempre positiva"], correct: 1, why: "Conservación de la carga: nada desaparece en el nodo." },
  { id: 52, type: "multiple", q: "En un circuito paralelo, la resistencia total es siempre:", options: ["Mayor que la mayor", "Igual al promedio", "Menor que la menor", "La suma de todas"], correct: 2, why: "Al añadir ramas, se abren más caminos para la corriente, reduciendo la resistencia global." },
  { id: 53, type: "fill", q: "Un circuito con una sola trayectoria para la corriente es un circuito en ___", correct: "serie", why: "La corriente es idéntica en todos los componentes del lazo." },
  { id: 54, type: "truefalse", q: "En un divisor de voltaje, la resistencia más grande consume menos voltaje.", correct: false, why: "En serie, el voltaje se reparte proporcionalmente a la resistencia (V=I*R)." },
  { id: 55, type: "multiple", q: "El teorema de Thévenin sustituye un circuito complejo por:", options: ["Una fuente de corriente y una R serie", "Una fuente de voltaje y una R serie", "Una fuente de voltaje y una R paralelo", "Dos fuentes de corriente"], correct: 1, why: "Simplifica el análisis visto desde dos terminales de carga." },
  { id: 56, type: "fill", q: "El equivalente de Norton consiste en una fuente de corriente en paralelo con una ___", correct: "resistencia", why: "Es el dual del teorema de Thévenin." },
  { id: 57, type: "multiple", q: "¿Qué condición se debe cumplir para la Máxima Transferencia de Potencia?", options: ["RL = 2*Rth", "RL = Rth / 2", "RL = Rth", "RL = 0"], correct: 2, why: "La resistencia de carga debe igualar la resistencia interna de la fuente." },
  { id: 58, type: "truefalse", q: "Un voltímetro ideal tiene resistencia cero.", correct: false, why: "Un voltímetro ideal debe tener resistencia infinita para no cargar el circuito." },
  { id: 59, type: "multiple", q: "La suma de voltajes en una malla cerrada es:", options: ["Cero", "La suma de corrientes", "El voltaje de entrada", "Infinito"], correct: 0, why: "Segunda Ley de Kirchhoff: la energía ganada es igual a la energía perdida." },
  { id: 60, type: "fill", q: "El instrumento para medir corriente se llama ___", correct: "amperimetro", why: "Se conecta siempre en serie con el circuito a medir." },
  { id: 61, type: "multiple", q: "Para un puente de Wheatstone equilibrado, el voltaje entre los nodos centrales es:", options: ["Máximo", "Cero", "La mitad de la fuente", "Depende de R1"], correct: 1, why: "El equilibrio significa que los potenciales en ambos nodos son iguales." },
  { id: 62, type: "truefalse", q: "La superposición solo se aplica a circuitos lineales.", correct: true, why: "Los elementos no lineales como diodos no permiten sumar respuestas individuales de fuentes." },
  { id: 63, type: "multiple", q: "Una fuente de voltaje ideal mantiene su voltaje constante independientemente de:", options: ["El tiempo", "La temperatura", "La carga conectada", "La polaridad"], correct: 2, why: "No tiene resistencia interna, por lo que no hay caída de tensión interna." },
  { id: 64, type: "fill", q: "La unidad de energía eléctrica consumida en hogares es el ___", correct: "kilovatio-hora", why: "kWh mide potencia multiplicada por tiempo." },
  { id: 65, type: "multiple", q: "¿Cuál es la resistencia total de tres R de 30Ω en paralelo?", options: ["90Ω", "10Ω", "15Ω", "30Ω"], correct: 1, why: "Rt = 1 / (1/30 + 1/30 + 1/30) = 30/3 = 10 Ohms." },
  { id: 66, type: "truefalse", q: "Un cortocircuito ideal tiene voltaje cero entre sus terminales.", correct: true, why: "V = I * R; si R es cero, V debe ser cero sin importar la corriente." },
  { id: 67, type: "multiple", q: "El análisis de mallas utiliza directamente:", options: ["LVK (Ley de Voltajes)", "LCK (Ley de Corrientes)", "Ley de Coulomb", "Teorema de Millman"], correct: 0, why: "Se basa en sumar caídas de tensión en trayectorias cerradas." },
  { id: 68, type: "fill", q: "En un divisor de corriente con dos ramas, la mayor corriente pasa por la resistencia ___", correct: "menor", why: "La corriente busca el camino de menor oposición." },
  { id: 69, type: "multiple", q: "¿Qué valor de resistencia tiene el código Naranja-Naranja-Café-Oro?", options: ["33Ω", "330Ω", "3.3kΩ", "33kΩ"], correct: 1, why: "3(Naranja) 3(Naranja) x 10(Café) = 330 Ohms." },
  { id: 70, type: "truefalse", q: "La eficiencia de un sistema eléctrico es Potencia de Salida / Potencia de Entrada.", correct: true, why: "La diferencia es la potencia perdida por calor o ineficiencias." },
  { id: 71, type: "multiple", q: "Un nodo de referencia común en un circuito se llama:", options: ["Fase", "Neutro", "Tierra (GND)", "Chasis"], correct: 2, why: "Se define como el punto de potencial cero voltios para el análisis." },
  { id: 72, type: "fill", q: "La potencia se mide con el ___", correct: "vatimetro", why: "Mide simultáneamente voltaje y corriente para calcular el producto P=VI." },
  { id: 73, type: "multiple", q: "Si una batería de 12V suministra 2A, la resistencia del circuito es:", options: ["24Ω", "0.16Ω", "6Ω", "10Ω"], correct: 2, why: "R = V / I = 12 / 2 = 6 Ohms." },
  { id: 74, type: "truefalse", q: "En serie, la resistencia total es la suma algebraica de las resistencias.", correct: true, why: "Cada resistencia añade un obstáculo adicional al único camino de corriente." },
  { id: 75, type: "multiple", q: "El teorema de Norton se basa en:", options: ["Fuentes de voltaje", "Fuentes de corriente", "Resistencias negativas", "Inductancia"], correct: 1, why: "Utiliza la corriente de cortocircuito entre los terminales." },
  { id: 76, type: "fill", q: "La caída de tensión en un cable se debe a su ___ interna.", correct: "resistencia", why: "Incluso los cables tienen una pequeña R que consume voltaje si la corriente es alta." },
  { id: 77, type: "multiple", q: "Un fusible se selecciona basado en su:", options: ["Voltaje de ruptura", "Corriente nominal", "Resistencia", "Tamaño"], correct: 1, why: "Debe quemarse cuando la corriente excede un límite seguro." },
  { id: 78, type: "truefalse", q: "Las baterías en paralelo aumentan el voltaje total.", correct: false, why: "En paralelo el voltaje es el mismo; aumenta la capacidad (Ah) o la corriente máxima." },
  { id: 79, type: "multiple", q: "El prefijo 'Giga' (G) equivale a:", options: ["10^6", "10^9", "10^12", "10^3"], correct: 1, why: "Mil millones de unidades (ej. GHz, GΩ)." },
  { id: 80, type: "fill", q: "El fenómeno de convertir energía eléctrica en térmica se llama efecto ___", correct: "joule", why: "Es la base de funcionamiento de estufas y planchas eléctricas." },
  { id: 81, type: "multiple", q: "En un circuito con 2 fuentes, la superposición requiere:", options: ["Sumar las fuentes", "Apagar una fuente a la vez", "Multiplicar los voltajes", "Usar solo una fuente"], correct: 1, why: "Se analiza el efecto de cada fuente de forma independiente y luego se suman los resultados." },
  { id: 82, type: "truefalse", q: "Una fuente de corriente ideal tiene resistencia interna infinita.", correct: true, why: "Para garantizar que la corriente no varíe sin importar la carga conectada en paralelo." },
  { id: 83, type: "multiple", q: "¿Qué sucede con la potencia si la corriente se duplica en una R fija?", options: ["Se duplica", "Se reduce", "Se cuadruplica", "No cambia"], correct: 2, why: "P = I² * R; si I es 2, I² es 4." },
  { id: 84, type: "fill", q: "Un material que obedece V=IR para cualquier voltaje se llama material ___", correct: "ohmico", why: "Su gráfica V-I es una línea recta que pasa por el origen." },
  { id: 85, type: "multiple", q: "Para medir la corriente en una rama sin cortarla se usa:", options: ["Multímetro", "Pinza amperimétrica", "Osciloscopio", "Óhmetro"], correct: 1, why: "Mide el campo magnético inducido por la corriente alterna (o efecto Hall en DC)." },
  { id: 86, type: "truefalse", q: "La resistencia de un voltímetro digital suele ser de unos 10 MΩ.", correct: true, why: "Es necesaria una impedancia alta para no alterar el voltaje del nodo medido." },
  { id: 87, type: "multiple", q: "Un miliamperio (mA) es:", options: ["0.1 A", "0.01 A", "0.001 A", "1000 A"], correct: 2, why: "La milésima parte de un Amperio." },
  { id: 88, type: "fill", q: "El inverso de la resistividad es la ___", correct: "conductividad", why: "Se denota con la letra sigma (σ)." },
  { id: 89, type: "multiple", q: "Un cable de calibre (AWG) 10 es:", options: ["Más grueso que el 14", "Más delgado que el 14", "Igual al 14", "De aluminio"], correct: 0, why: "En el sistema AWG, a menor número, mayor es el grosor del cable." },
  { id: 90, type: "truefalse", q: "La potencia reactiva realiza trabajo útil.", correct: false, why: "La potencia reactiva oscila entre la fuente y la carga sin convertirse en trabajo (motores/capacitores)." },
  { id: 91, type: "multiple", q: "El factor de potencia es el coseno del ángulo entre:", options: ["V e I", "P y Q", "R y L", "I y t"], correct: 0, why: "Indica qué tan eficiente es el uso de la energía alterna." },
  { id: 92, type: "fill", q: "La carga de una batería se mide comúnmente en Amperios-___", correct: "hora", why: "Ah indica cuánta corriente puede dar la batería durante una hora." },
  { id: 93, type: "multiple", q: "Un puente de Wheatstone se usa principalmente para medir:", options: ["Voltajes altos", "Corrientes bajas", "Resistencias desconocidas", "Frecuencia"], correct: 2, why: "Permite una medición muy precisa mediante el método de equilibrio de cero." },
  { id: 94, type: "truefalse", q: "Un termistor NTC aumenta su resistencia con el calor.", correct: false, why: "NTC significa Negative Temperature Coefficient; la resistencia baja al subir el calor." },
  { id: 95, type: "multiple", q: "En un circuito DC, un capacitor en estado estacionario actúa como:", options: ["Resistencia baja", "Cable", "Circuito abierto", "Fuente"], correct: 2, why: "Una vez cargado al voltaje de fuente, ya no permite flujo de corriente continua." },
  { id: 96, type: "fill", q: "La unidad de la inductancia es el ___", correct: "henrio", why: "Simbolizado por la letra H." },
  { id: 97, type: "multiple", q: "Un inductor en DC (estado estacionario) actúa como:", options: ["Circuito abierto", "Cortocircuito", "Resistencia alta", "Batería"], correct: 1, why: "Sin variaciones de corriente, no hay autoinducción; se comporta como un simple cable." },
  { id: 98, type: "truefalse", q: "La ley de Kirchhoff de voltajes se basa en la conservación de la energía.", correct: true, why: "El voltaje es energía por carga; la energía total en un lazo debe conservarse." },
  { id: 99, type: "multiple", q: "Un resistor con bandas Rojo-Rojo-Rojo tiene un valor de:", options: ["22Ω", "220Ω", "2.2kΩ", "22kΩ"], correct: 2, why: "2, 2 y multiplicador de 100 (10^2)." },
  { id: 100, type: "fill", q: "El elemento que limita la corriente para evitar daños se llama ___ de protección.", correct: "fusible", why: "Interrumpe el circuito si se supera la corriente segura." },

  // --- BLOQUE 3: COMPONENTES PASIVOS Y MAGNETISMO (101-150) ---
  { id: 101, type: "multiple", q: "¿Qué material es ferromagnético?", options: ["Aluminio", "Cobre", "Hierro", "Plástico"], correct: 2, why: "El hierro tiene dominios magnéticos que se alinean fácilmente con un campo externo." },
  { id: 102, type: "fill", q: "La densidad de flujo magnético se mide en ___", correct: "tesla", why: "1 Tesla = 1 Weber por metro cuadrado." },
  { id: 103, type: "truefalse", q: "Un campo magnético variable induce una corriente en un conductor.", correct: true, why: "Es la ley de inducción de Faraday." },
  { id: 104, type: "multiple", q: "La fuerza electromotriz inducida (fem) es proporcional a:", options: ["La corriente constante", "El flujo magnético estático", "La tasa de cambio del flujo", "La temperatura"], correct: 2, why: "Ley de Faraday: e = -N * (dΦ/dt)." },
  { id: 105, type: "multiple", q: "¿Qué establece la Ley de Lenz?", options: ["La dirección de la corriente inducida", "La magnitud del voltaje", "La resistencia del aire", "La velocidad de la luz"], correct: 0, why: "La corriente inducida crea un campo que se OPONE al cambio que la produjo." },
  { id: 106, type: "fill", q: "La oposición de un material a la creación de flujo magnético es la ___", correct: "reluctancia", why: "Es el análogo magnético a la resistencia eléctrica." },
  { id: 107, type: "multiple", q: "Un transformador ideal con Np=100 y Ns=1000 eleva el voltaje:", options: ["2 veces", "5 veces", "10 veces", "100 veces"], correct: 2, why: "Relación de transformación Vp/Vs = Np/Ns." },
  { id: 108, type: "truefalse", q: "Un imán permanente pierde su magnetismo si se calienta por encima de la temperatura de Curie.", correct: true, why: "La energía térmica desordena los dominios magnéticos del material." },
  { id: 109, type: "multiple", q: "La permeabilidad del vacío (μ0) es:", options: ["4π x 10^-7 H/m", "8.85 x 10^-12 F/m", "1.6 x 10^-19 C", "9 x 10^9"], correct: 0, why: "Define cómo el campo magnético interactúa con el espacio vacío." },
  { id: 110, type: "fill", q: "El dispositivo que usa magnetismo para abrir o cerrar contactos eléctricos es el ___", correct: "rele", why: "O relevador, permite controlar cargas grandes con señales pequeñas." },
  { id: 111, type: "multiple", q: "¿Cuál es la unidad del flujo magnético?", options: ["Tesla", "Weber", "Henrio", "Gauss"], correct: 1, why: "El Weber (Wb) mide el flujo total a través de una superficie." },
  { id: 112, type: "truefalse", q: "Las líneas de campo magnético siempre forman lazos cerrados.", correct: true, why: "No existen monopolos magnéticos (norte o sur aislados)." },
  { id: 113, type: "multiple", q: "Un solenoide es:", options: ["Un semiconductor", "Una bobina de cable", "Un tipo de batería", "Un aislante"], correct: 1, why: "Al pasar corriente, genera un campo magnético uniforme en su interior." },
  { id: 114, type: "fill", q: "La propiedad de una bobina de oponerse a cambios de corriente es la ___", correct: "inductancia", why: "Se debe a la energía almacenada en el campo magnético generado." },
  { id: 115, type: "multiple", q: "En un capacitor, la energía se almacena en:", options: ["Las placas", "El dieléctrico (campo eléctrico)", "Los cables", "El aire"], correct: 1, why: "El campo eléctrico entre las placas retiene la energía potencial." },
  { id: 116, type: "truefalse", q: "La reactancia inductiva (XL) aumenta con la frecuencia.", correct: true, why: "XL = 2πfL; a mayor frecuencia, mayor oposición al cambio de corriente." },
  { id: 117, type: "multiple", q: "La unidad de frecuencia es el:", options: ["Hertz", "Segundo", "Radián", "Ohm"], correct: 0, why: "1 Hertz (Hz) equivale a un ciclo por segundo." },
  { id: 118, type: "fill", q: "La suma de resistencias y reactancias en AC se llama ___", correct: "impedancia", why: "Se mide en Ohms y se representa con la letra Z." },
  { id: 119, type: "multiple", q: "Un filtro pasa-bajos ideal bloquea:", options: ["DC", "Frecuencias altas", "Frecuencias medias", "Todo"], correct: 1, why: "Deja pasar frecuencias por debajo de la frecuencia de corte (fc)." },
  { id: 120, type: "truefalse", q: "Un transformador puede funcionar con una batería de 9V DC de forma continua.", correct: false, why: "Solo funciona con corrientes variables (AC) para inducir flujo cambiante." },
  { id: 121, type: "multiple", q: "El desfase entre V e I en un inductor puro es:", options: ["0°", "45°", "90° (V adelanta a I)", "90° (I adelanta a V)"], correct: 2, why: "El inductor se opone al cambio de corriente, por lo que el voltaje aparece antes." },
  { id: 122, type: "fill", q: "El desfase entre V e I en un capacitor puro es de ___ grados.", correct: "90", why: "Donde la corriente adelanta al voltaje (ICE)." },
  { id: 123, type: "multiple", q: "La resonancia en un circuito RLC ocurre cuando:", options: ["R = 0", "XL = XC", "V = 0", "L = C"], correct: 1, why: "Las reactancias se cancelan, dejando solo la parte resistiva." },
  { id: 124, type: "truefalse", q: "El factor de calidad (Q) indica la selectividad de un circuito sintonizado.", correct: true, why: "Un Q alto significa una banda de paso muy estrecha." },
  { id: 125, type: "multiple", q: "¿Qué componente se usa para suprimir picos de voltaje magnéticos (flyback)?", options: ["Resistor", "Capacitor", "Diodo", "Inductor"], correct: 2, why: "Se coloca en paralelo a la bobina para descargar la energía al apagarla." },
  { id: 126, type: "fill", q: "El núcleo de un transformador de alta frecuencia suele ser de ___", correct: "ferrita", why: "La ferrita reduce las pérdidas por corrientes de Foucault (Eddy currents)." },
  { id: 127, type: "multiple", q: "La ley de Ampere relaciona:", options: ["Voltaje y carga", "Corriente y campo magnético", "Calor y luz", "Fuerza y masa"], correct: 1, why: "Establece que una corriente produce un campo magnético a su alrededor." },
  { id: 128, type: "truefalse", q: "La inductancia mutua es la base del funcionamiento de los motores.", correct: true, why: "La interacción de campos entre estator y rotor produce el movimiento." },
  { id: 129, type: "multiple", q: "Un material diamagnético:", options: ["Se atrae fuerte", "Se repele débilmente", "Es un imán", "No reacciona"], correct: 1, why: "Tiende a crear un campo opuesto muy débil (ej. Bismuto, Agua)." },
  { id: 130, type: "fill", q: "La fuerza que experimenta una carga en movimiento en un campo magnético es la fuerza de ___", correct: "lorentz", why: "F = q(E + v x B)." },
  { id: 131, type: "multiple", q: "El valor RMS de una señal senoidal de 170V pico es aprox:", options: ["100V", "120V", "170V", "240V"], correct: 1, why: "Vrms = Vpico / √2 ≈ 0.707 * 170 ≈ 120V." },
  { id: 132, type: "truefalse", q: "En resonancia serie, la impedancia es mínima.", correct: true, why: "Al cancelarse las reactancias, solo queda la resistencia del cable." },
  { id: 133, type: "multiple", q: "La reactancia capacitiva (XC) se calcula como:", options: ["2πfC", "1 / (2πfC)", "L / C", "V * I"], correct: 1, why: "Inversamente proporcional a la frecuencia y capacitancia." },
  { id: 134, type: "fill", q: "La unidad de la reactancia es el ___", correct: "ohm", why: "Aunque no disipa calor como una R, se opone al flujo y se mide en Ohms." },
  { id: 135, type: "multiple", q: "¿Qué tipo de capacitor tiene polaridad?", options: ["Cerámico", "Poliéster", "Electrolítico", "Mica"], correct: 2, why: "Usan un electrolito químico y si se invierten pueden fallar catastróficamente." },
  { id: 136, type: "truefalse", q: "Un capacitor bloquea las señales de alta frecuencia.", correct: false, why: "Al contrario, su reactancia baja a alta frecuencia, actuando casi como un cable (acoplamiento)." },
  { id: 137, type: "multiple", q: "El ciclo de histéresis muestra la relación entre:", options: ["V e I", "B y H", "P y t", "R y T"], correct: 1, why: "Muestra cómo el flujo magnético (B) se retrasa respecto a la intensidad de campo (H)." },
  { id: 138, type: "fill", q: "La unidad de intensidad de campo magnético es Amperio por ___", correct: "metro", why: "A/m es la unidad en el SI." },
  { id: 139, type: "multiple", q: "Un inductor de 10mH y uno de 20mH en serie dan:", options: ["6.6mH", "10mH", "30mH", "200mH"], correct: 2, why: "En serie las inductancias se suman como las resistencias." },
  { id: 140, type: "truefalse", q: "Dos bobinas en paralelo sin acoplamiento magnético tienen una Leq menor que la menor.", correct: true, why: "Siguen la misma regla que las resistencias en paralelo." },
  { id: 141, type: "multiple", q: "El efecto pelicular (skin effect) en AC causa que:", options: ["La corriente fluya por el centro", "La resistencia baje", "La corriente fluya por la superficie", "El cable se enfríe"], correct: 2, why: "A altas frecuencias, la corriente se desplaza hacia la periferia del conductor." },
  { id: 142, type: "fill", q: "Un dispositivo que convierte energía mecánica en eléctrica usando magnetismo es un ___", correct: "generador", why: "Basado en la ley de Faraday-Lenz." },
  { id: 143, type: "multiple", q: "¿Qué parámetro de un capacitor indica su pérdida de energía?", options: ["Tolerancia", "Voltaje nominal", "Factor de disipación", "Capacitancia"], correct: 2, why: "Representa la relación entre la resistencia serie equivalente y la reactancia." },
  { id: 144, type: "truefalse", q: "Los aislantes magnéticos no existen realmente.", correct: true, why: "No hay material que bloquee totalmente el flujo magnético; solo se puede desviar (blindaje)." },
  { id: 145, type: "multiple", q: "Un motor de inducción funciona con:", options: ["DC", "AC", "Imanes permanentes", "Baterías"], correct: 1, why: "Requiere un campo magnético rotativo generado por corrientes alternas." },
  { id: 146, type: "fill", q: "El prefijo 'Nano' (n) equivale a ___", correct: "10^-9", why: "Común en capacitores (nF)." },
  { id: 147, type: "multiple", q: "La potencia aparente (S) se mide en:", options: ["Watts", "VAR", "Volt-Amperios (VA)", "Joules"], correct: 2, why: "Es la suma fasorial de la potencia real y reactiva." },
  { id: 148, type: "truefalse", q: "Un inductor almacena energía indefinidamente como una batería.", correct: false, why: "La energía se pierde rápidamente debido a la resistencia interna del cable de la bobina." },
  { id: 149, type: "multiple", q: "El fenómeno de magnetostricción causa:", options: ["Cambio de color", "Cambio de forma física", "Aumento de voltaje", "Fusión nuclear"], correct: 1, why: "Ciertos materiales cambian de dimensiones al ser magnetizados (causa el zumbido de transformadores)." },
  { id: 150, type: "fill", q: "El componente que permite el paso de una banda de frecuencias es un filtro ___", correct: "pasa-banda", why: "Combina características de pasa-altos y pasa-bajos." },

  // --- BLOQUE 4: SEMICONDUCTORES Y DIODOS (151-200) ---
  { id: 151, type: "multiple", q: "¿Cuál es el elemento semiconductor más utilizado?", options: ["Germanio", "Silicio", "Carbono", "Galio"], correct: 1, why: "El silicio es abundante, estable y fácil de procesar." },
  { id: 152, type: "fill", q: "Un cristal semiconductor con impurezas añadidas se llama semiconductor ___", correct: "extrinseco", why: "El proceso de añadir impurezas se llama dopaje." },
  { id: 153, type: "truefalse", q: "Un semiconductor tipo N tiene exceso de huecos.", correct: false, why: "Tipo N (Negativo) tiene exceso de electrones; el tipo P tiene exceso de huecos." },
  { id: 154, type: "multiple", q: "La unión de un material P y uno N crea una zona llamada:", options: ["Zona de carga", "Región de agotamiento", "Canal", "Puerta"], correct: 1, why: "Es el área libre de portadores mayoritarios cerca de la unión." },
  { id: 155, type: "multiple", q: "Un diodo ideal en polarización inversa actúa como:", options: ["Resistencia de 1Ω", "Batería", "Circuito abierto", "Cortocircuito"], correct: 2, why: "Bloquea totalmente el paso de corriente." },
  { id: 156, type: "fill", q: "La caída de voltaje en un diodo de Silicio es de ___ voltios.", correct: "0.7", why: "Es el umbral necesario para vencer la barrera de potencial." },
  { id: 157, type: "multiple", q: "¿Qué diodo se usa específicamente para regulación de voltaje?", options: ["LED", "Schottky", "Zener", "Varicap"], correct: 2, why: "El Zener mantiene un voltaje constante cuando trabaja en la región de ruptura inversa." },
  { id: 158, type: "truefalse", q: "Un diodo LED emite luz cuando está polarizado en inversa.", correct: false, why: "Solo emite luz en polarización directa, cuando los electrones recombinan con huecos." },
  { id: 159, type: "multiple", q: "El diodo Schottky destaca por:", options: ["Alto voltaje", "Baja caída de tensión y alta velocidad", "Emitir luz azul", "Ser muy grande"], correct: 1, why: "Usa una unión metal-semiconductor, ideal para fuentes conmutadas." },
  { id: 160, type: "fill", q: "Un rectificador de onda completa usa un puente de ___ diodos.", correct: "cuatro", why: "Permite que ambos semiciclos de la AC fluyan en el mismo sentido hacia la carga." },
  { id: 161, type: "multiple", q: "El terminal positivo de un diodo es el:", options: ["Cátodo", "Ánodo", "Base", "Puerta"], correct: 1, why: "La corriente fluye del Ánodo al Cátodo." },
  { id: 162, type: "truefalse", q: "Un rectificador de media onda aprovecha el 100% de la energía de entrada.", correct: false, why: "Desperdicia el semiciclo opuesto, siendo muy ineficiente." },
  { id: 163, type: "multiple", q: "Para filtrar el rizado después de un puente de diodos se usa un:", options: ["Resistor", "Inductor pequeño", "Capacitor grande", "Diodo Zener"], correct: 2, why: "El capacitor almacena energía en los picos y la entrega en los valles de la señal." },
  { id: 164, type: "fill", q: "El diodo cuya capacitancia varía con el voltaje inverso es el ___", correct: "varicap", why: "O diodo varactor, se usa en sintonizadores de radio." },
  { id: 165, type: "multiple", q: "La corriente de fuga en inversa en el Silicio es del orden de:", options: ["Amperios", "Miliamperios", "Nanoamperios", "Kilamperios"], correct: 2, why: "Es extremadamente pequeña, lo que lo hace un gran interruptor." },
  { id: 166, type: "truefalse", q: "Un fotodiodo conduce mejor cuando recibe luz.", correct: true, why: "La luz aporta energía para crear pares electrón-hueco en la unión." },
  { id: 167, type: "multiple", q: "¿Cuál es la función de un diodo de protección en un relé?", options: ["Amplificar", "Eliminar el pico de voltaje inductivo", "Hacer que brille", "Rectificar 220V"], correct: 1, why: "Protege al transistor de control contra la fuerza contra-electromotriz de la bobina." },
  { id: 168, type: "fill", q: "El proceso de convertir AC en DC se llama ___", correct: "rectificacion", why: "Es el primer paso en casi todas las fuentes de alimentación." },
  { id: 169, type: "multiple", q: "Un Optoacoplador sirve para:", options: ["Aumentar el voltaje", "Aislamiento eléctrico entre circuitos", "Medir distancia", "Cargar baterías"], correct: 1, why: "Transmite una señal mediante luz, evitando el contacto eléctrico físico." },
  { id: 170, type: "truefalse", q: "El Germanio tiene una barrera de potencial de 0.3V.", correct: true, why: "Menor que el silicio, útil en aplicaciones de señales de audio pequeñas." },
  { id: 171, type: "multiple", q: "El dopaje con fósforo en Silicio crea un semiconductor:", options: ["Tipo P", "Tipo N", "Aislante", "Metálico"], correct: 1, why: "El fósforo tiene 5 electrones de valencia (donante), creando tipo N." },
  { id: 172, type: "fill", q: "Un átomo de impureza que acepta un electrón se llama ___", correct: "aceptor", why: "Crea un 'hueco' en el material tipo P." },
  { id: 173, type: "multiple", q: "¿Qué sucede con la barrera de potencial en polarización directa?", options: ["Se ensancha", "Se estrecha", "No cambia", "Desaparece"], correct: 1, why: "El campo externo empuja los portadores hacia la unión, permitiendo el paso." },
  { id: 174, type: "truefalse", q: "El diodo túnel funciona basado en mecánica cuántica.", correct: true, why: "Permite el paso de electrones a través de una barrera delgada por efecto túnel." },
  { id: 175, type: "multiple", q: "La serie de diodos 1N400x es famosa por ser:", options: ["Rápida", "De rectificación de potencia", "Zener", "Emisora de luz"], correct: 1, why: "Son diodos estándar para rectificar corrientes de hasta 1A." },
  { id: 176, type: "fill", q: "La sigla LED significa Light Emitting ___", correct: "diode", why: "En español: Diodo Emisor de Luz." },
  { id: 177, type: "multiple", q: "Un diodo con una caída de 0.2V es probablemente un:", options: ["Silicio", "Germanio", "Schottky", "Zener"], correct: 2, why: "Los diodos Schottky tienen caídas de tensión muy bajas." },
  { id: 178, type: "truefalse", q: "Un diodo puede dañarse por exceso de calor durante la soldadura.", correct: true, why: "El calor excesivo altera la estructura cristalina del semiconductor." },
  { id: 179, type: "multiple", q: "El parámetro PIV en un diodo significa:", options: ["Potencia Interna Variable", "Peak Inverse Voltage", "Positivo Inverso Variable", "Pérdida de Intensidad Visible"], correct: 1, why: "Es el voltaje máximo que el diodo soporta en inversa sin romperse." },
  { id: 180, type: "fill", q: "Para limitar la corriente en un LED se usa una ___ en serie.", correct: "resistencia", why: "Sin ella, el LED absorbería demasiada corriente y se quemaría." },
  { id: 181, type: "multiple", q: "Si un LED tiene Vf=2V y la fuente es 5V, para 20mA la R debe ser:", options: ["150Ω", "330Ω", "1kΩ", "10kΩ"], correct: 0, why: "R = (5-2) / 0.020 = 150 Ohms." },
  { id: 182, type: "truefalse", q: "Los diodos láser funcionan igual que un LED común.", correct: false, why: "Requieren una cavidad óptica resonante para producir luz coherente y monocromática." },
  { id: 183, type: "multiple", q: "Un varistor (MOV) se usa para:", options: ["Rectificar", "Proteger contra transitorios de voltaje", "Medir luz", "Amplificar"], correct: 1, why: "Su resistencia cae bruscamente ante un sobrevoltaje, desviando la energía." },
  { id: 184, type: "fill", q: "El material semiconductor del grupo III produce un material tipo ___", correct: "p", why: "Tiene 3 electrones, dejando un hueco respecto a los 4 del silicio." },
  { id: 185, type: "multiple", q: "¿Qué sucede si se supera el voltaje Zener?", options: ["El diodo explota", "Se bloquea", "Conduce en inversa de forma regulada", "Se vuelve aislante"], correct: 2, why: "Está diseñado precisamente para conducir en esa zona sin dañarse (si se controla la corriente)." },
  { id: 186, type: "truefalse", q: "La eficiencia de un puente rectificador es del 100%.", correct: false, why: "Siempre hay caídas de voltaje en los diodos (2 x 0.7V) y pérdidas por calor." },
  { id: 187, type: "multiple", q: "Un diodo PIN se usa frecuentemente en:", options: ["Fuentes de PC", "Conmutación de RF", "Audio de alta fidelidad", "Motores"], correct: 1, why: "Tiene una región intrínseca que lo hace ideal para señales de alta frecuencia." },
  { id: 188, type: "fill", q: "El cátodo en un LED físico suele ser la pata más ___", correct: "corta", why: "Es una convención de fabricación para identificar la polaridad." },
  { id: 189, type: "multiple", q: "¿Cuál es el color de un LED con mayor caída de voltaje?", options: ["Rojo", "Verde", "Azul", "Amarillo"], correct: 2, why: "El azul (y el blanco) requieren más energía (voltaje) para emitir fotones de mayor frecuencia." },
  { id: 190, type: "truefalse", q: "Los diodos se pueden conectar en paralelo para sumar su corriente sin precauciones.", correct: false, why: "Debido a las tolerancias, uno siempre conducirá más que otro y puede quemarse; se requieren resistencias de equilibrado." },
  { id: 191, type: "multiple", q: "El fenómeno de avalancha ocurre en:", options: ["Condensadores", "Polarización inversa excesiva", "Resistencias calientes", "Cables sueltos"], correct: 1, why: "Los electrones ganan tanta energía que liberan más electrones por choque." },
  { id: 192, type: "fill", q: "El diodo que detecta señales de radio por contacto de punta se llama diodo de ___", correct: "galena", why: "Usado en las antiguas radios de galena." },
  { id: 193, type: "multiple", q: "Un diodo TVS sirve para:", options: ["Ver televisión", "Supresión de transitorios de voltaje", "Amplificar video", "Regular brillo"], correct: 1, why: "Transient Voltage Suppressor, muy rápido para proteger contra ESD." },
  { id: 194, type: "truefalse", q: "Un puente rectificador entrega una señal de DC pura.", correct: false, why: "Entrega DC pulsante; necesita capacitores para ser una línea recta plana." },
  { id: 195, type: "multiple", q: "El tiempo de recuperación inversa (trr) es crítico en:", options: ["Linternas LED", "Fuentes conmutadas de alta frecuencia", "Cargadores lentos", "Audio"], correct: 1, why: "Indica qué tan rápido el diodo puede dejar de conducir al invertir la polaridad." },
  { id: 196, type: "fill", q: "La parte plana de un LED de 5mm indica el ___", correct: "catodo", why: "Es otra marca física común para identificar el negativo." },
  { id: 197, type: "multiple", q: "Un triac es básicamente:", options: ["Un diodo gigante", "Dos SCRs en antiparalelo", "Un transistor de potencia", "Un capacitor variable"], correct: 1, why: "Permite el control de corriente alterna en ambos sentidos." },
  { id: 198, type: "truefalse", q: "Un SCR puede apagarse simplemente quitando la señal de puerta (gate).", correct: false, why: "Una vez encendido, solo se apaga reduciendo la corriente principal por debajo del nivel de mantenimiento." },
  { id: 199, type: "multiple", q: "El Diac se usa comúnmente para disparar:", options: ["LEDs", "Motores DC", "Triacs", "Relés"], correct: 2, why: "Proporciona pulsos definidos cuando el voltaje supera su umbral." },
  { id: 200, type: "fill", q: "La temperatura máxima de unión de un componente de silicio suele ser de ___ grados C.", correct: "150", why: "Más allá de esto, el material pierde sus propiedades semiconductoras." },

  // --- BLOQUE 5: TRANSISTORES (BJT, FET, MOSFET) (201-250) ---
  { id: 201, type: "multiple", q: "Los tres terminales de un transistor BJT son:", options: ["Base, Colector, Emisor", "Puerta, Drenador, Fuente", "Ánodo, Cátodo, Puerta", "Entrada, Salida, GND"], correct: 0, why: "Bipolar Junction Transistor: la base controla el flujo entre colector y emisor." },
  { id: 202, type: "fill", q: "En un transistor BJT, la ganancia de corriente se denomina ___", correct: "beta", why: "O hFE, relaciona la corriente de base con la de colector." },
  { id: 203, type: "truefalse", q: "Un transistor NPN se activa con un voltaje positivo en la base respecto al emisor.", correct: true, why: "Requiere polarización directa en la unión B-E." },
  { id: 204, type: "multiple", q: "Un MOSFET es un transistor controlado por:", options: ["Corriente", "Voltaje", "Luz", "Calor"], correct: 1, why: "Metal-Oxide-Semiconductor FET: el voltaje en la puerta crea un campo eléctrico." },
  { id: 205, type: "multiple", q: "¿Qué región de operación del BJT se usa para amplificación lineal?", options: ["Saturación", "Corte", "Activa", "Ruptura"], correct: 2, why: "En la región activa, la corriente de colector es proporcional a la de base." },
  { id: 206, type: "fill", q: "Un transistor en saturación actúa como un interruptor ___", correct: "cerrado", why: "Permite el paso máximo de corriente con mínima caída de voltaje." },
  { id: 207, type: "multiple", q: "Los terminales de un MOSFET son:", options: ["B, C, E", "G, D, S", "A, K, G", "V+, V-, Out"], correct: 1, why: "Gate (Puerta), Drain (Drenador), Source (Fuente)." },
  { id: 208, type: "truefalse", q: "La impedancia de entrada de un MOSFET es extremadamente baja.", correct: false, why: "Es extremadamente alta porque la puerta está aislada por una capa de óxido." },
  { id: 209, type: "multiple", q: "Un transistor Darlington consiste en:", options: ["Un transistor gigante", "Dos transistores cascada para alta ganancia", "Un transistor y un diodo", "Un MOSFET y un BJT"], correct: 1, why: "La ganancia total es el producto de las ganancias individuales (β1 * β2)." },
  { id: 210, type: "fill", q: "El transistor de efecto de campo de juntura se abrevia ___", correct: "jfet", why: "Junction Field Effect Transistor." },
  { id: 211, type: "multiple", q: "En un JFET de canal N, para reducir la corriente se aplica a la puerta:", options: ["Voltaje positivo", "Voltaje negativo", "GND", "Corriente alta"], correct: 1, why: "El voltaje negativo ensancha la zona de agotamiento, cerrando el canal." },
  { id: 212, type: "truefalse", q: "El MOSFET de potencia es ideal para conmutación rápida.", correct: true, why: "Al ser un dispositivo de portadores mayoritarios, no tiene tiempos de almacenamiento de carga como el BJT." },
  { id: 213, type: "multiple", q: "¿Cuál es el voltaje Vbe típico de encendido para un BJT de silicio?", options: ["0.2V", "0.7V", "2.0V", "5.0V"], correct: 1, why: "Es igual a la caída de tensión de un diodo de silicio estándar." },
  { id: 214, type: "fill", q: "La configuración donde la entrada es por la base y la salida por el colector es Emisor ___", correct: "comun", why: "Es la configuración más usada para amplificación de voltaje y corriente." },
  { id: 215, type: "multiple", q: "Un transistor PNP:", options: ["Saca corriente por la base", "Mete corriente por la base", "Solo usa electrones", "No existe"], correct: 0, why: "Para encenderlo, la base debe ser más negativa que el emisor." },
  { id: 216, type: "truefalse", q: "El embalamiento térmico puede destruir un transistor BJT.", correct: true, why: "Al calentarse conduce más, lo que genera más calor, en un ciclo destructivo." },
  { id: 217, type: "multiple", q: "La 'S' en el código de transistores japoneses (ej 2SC945) significa:", options: ["Silicio", "Semiconductor", "Super", "Salida"], correct: 1, why: "2S indica un dispositivo semiconductor con dos uniones (transistor)." },
  { id: 218, type: "fill", q: "El dispositivo que combina la entrada del MOSFET con la salida del BJT es el ___", correct: "igbt", why: "Insulated Gate Bipolar Transistor, usado en alta potencia." },
  { id: 219, type: "multiple", q: "Un MOSFET tipo empobrecimiento (depletion):", options: ["Está apagado por defecto", "Está encendido por defecto", "Usa mucha corriente", "Es de oro"], correct: 1, why: "Conduce con Vgs = 0; se necesita voltaje para apagarlo." },
  { id: 220, type: "truefalse", q: "La disipación de potencia de un transistor es Vce * Ic.", correct: true, why: "Esa energía se convierte en calor y debe ser disipada por un disipador." },
  { id: 221, type: "multiple", q: "El parámetro Vgs(th) de un MOSFET indica:", options: ["Voltaje máximo", "Voltaje de umbral para empezar a conducir", "Voltaje de ruptura", "Voltaje de saturación"], correct: 1, why: "Threshold Voltage: el voltaje mínimo en Gate para abrir el canal." },
  { id: 222, type: "fill", q: "La resistencia de un MOSFET cuando está totalmente encendido se llama ___", correct: "rds(on)", why: "Es un parámetro crítico para calcular pérdidas en conmutación." },
  { id: 223, type: "multiple", q: "Un transistor en 'Corte' actúa como:", options: ["Cable", "Amplificador", "Interruptor abierto", "Batería"], correct: 2, why: "No hay flujo de corriente entre colector y emisor." },
  { id: 224, type: "truefalse", q: "Los transistores de germanio son mejores para altas temperaturas que los de silicio.", correct: false, why: "El silicio aguanta mucha más temperatura antes de volverse inestable." },
  { id: 225, type: "multiple", q: "La configuración de Seguidor de Emisor (Colector Común) tiene:", options: ["Alta ganancia de voltaje", "Baja impedancia de entrada", "Ganancia de voltaje unitaria (aprox 1)", "Salida invertida"], correct: 2, why: "Se usa como buffer porque tiene alta impedancia de entrada y baja de salida." },
  { id: 226, type: "fill", q: "El encapsulado negro pequeño típico de transistores de señal es el ___", correct: "to-92", why: "Es el estándar para transistores como el BC547 o 2N2222." },
  { id: 227, type: "multiple", q: "Un transistor de potencia suele usar un encapsulado:", options: ["TO-92", "TO-220", "DIP-8", "SOT-23"], correct: 1, why: "El TO-220 permite atornillar un disipador de calor metálico." },
  { id: 228, type: "truefalse", q: "Un transistor puede amplificar potencia.", correct: true, why: "Usa una pequeña potencia de entrada para controlar una mucho mayor de la fuente." },
  { id: 229, type: "multiple", q: "¿Qué transistor es más propenso a daños por electricidad estática?", options: ["BJT", "JFET", "MOSFET", "UJT"], correct: 2, why: "Su capa de óxido es tan delgada que unos pocos voltios estáticos pueden perforarla." },
  { id: 230, type: "fill", q: "La unión de un semiconductor con un metal en el MOSFET se llama ___", correct: "compuerta", why: "O Gate, aislada por dióxido de silicio." },
  { id: 231, type: "multiple", q: "En un amplificador Clase A, el transistor conduce durante:", options: ["180° del ciclo", "90° del ciclo", "360° del ciclo", "Solo los picos"], correct: 2, why: "Conduce siempre, lo que da alta fidelidad pero baja eficiencia." },
  { id: 232, type: "truefalse", q: "La configuración Base Común es ideal para aplicaciones de alta frecuencia.", correct: true, why: "Tiene baja capacitancia de entrada y buena respuesta en frecuencia." },
  { id: 233, type: "multiple", q: "El transistor Unijuntura (UJT) se usa principalmente para:", options: ["Amplificar audio", "Circuitos de disparo y osciladores", "Fuentes de 100A", "Computadoras"], correct: 1, why: "Tiene una característica de resistencia negativa útil en osciladores de relajación." },
  { id: 234, type: "fill", q: "El fenómeno donde la corriente de colector aumenta por el calor se llama fuga ___", correct: "termica", why: "Especialmente problemática en transistores de potencia." },
  { id: 235, type: "multiple", q: "¿Qué significa que un MOSFET sea 'Logic Level'?", options: ["Que solo entiende 1 y 0", "Que se activa totalmente con 5V o menos", "Que es muy pequeño", "Que es de bajo voltaje"], correct: 1, why: "Se pueden controlar directamente desde un microcontrolador sin drivers complejos." },
  { id: 236, type: "truefalse", q: "Un fototransistor es más sensible que un fotodiodo.", correct: true, why: "Posee una ganancia interna (beta) que multiplica la corriente generada por la luz." },
  { id: 237, type: "multiple", q: "La zona de 'ohmica' de un FET es donde:", options: ["Actúa como amplificador", "Actúa como una resistencia variable controlada por voltaje", "Está quemado", "No conduce"], correct: 1, why: "Para voltajes bajos de D-S, el canal se comporta como una R lineal." },
  { id: 238, type: "fill", q: "Para apagar un MOSFET canal N se debe poner la puerta a ___ voltios.", correct: "0", why: "O a GND, para eliminar el campo que forma el canal conductor." },
  { id: 239, type: "multiple", q: "El par diferencial se usa en la entrada de:", options: ["Motores", "Amplificadores operacionales", "Baterías", "Transformadores"], correct: 1, why: "Permite amplificar la diferencia entre dos señales y rechazar el ruido común." },
  { id: 240, type: "truefalse", q: "Un transistor digital (RET) incluye resistencias internas en la base.", correct: true, why: "Simplifica el diseño permitiendo conexión directa a lógica digital." },
  { id: 241, type: "multiple", q: "La frecuencia de transición (ft) de un transistor indica:", options: ["Voltaje máximo", "Frecuencia donde la ganancia cae a 1", "Tiempo de encendido", "Temperatura"], correct: 1, why: "Es el límite práctico de velocidad del dispositivo." },
  { id: 242, type: "fill", q: "La ganancia de un transistor en configuración base común es ___ que 1.", correct: "menor", why: "La corriente de emisor es siempre un poco mayor que la de colector." },
  { id: 243, type: "multiple", q: "Un MOSFET con diodo parásito integrado:", options: ["Es un error de fábrica", "Es normal por su construcción", "Es para que brille", "Es un Zener"], correct: 1, why: "Se forma naturalmente entre fuente y drenador, útil para protección inductiva." },
  { id: 244, type: "truefalse", q: "El transistor de grafeno promete velocidades de TeraHertz.", correct: true, why: "Debido a la altísima movilidad de electrones en el grafeno." },
  { id: 245, type: "multiple", q: "Para un transistor BC547 (NPN), el pinout típico mirando de frente es:", options: ["B-C-E", "C-B-E", "E-B-C", "G-D-S"], correct: 1, why: "Es la configuración estándar del encapsulado TO-92 para esta serie." },
  { id: 246, type: "fill", q: "Un transistor que solo conduce una parte del ciclo de señal es Clase ___", correct: "c", why: "Alta eficiencia pero mucha distorsión, usado en transmisores de radio." },
  { id: 247, type: "multiple", q: "¿Qué transistor elegirías para controlar 50A a 1200V?", options: ["BC548", "2N2222", "IGBT de potencia", "JFET"], correct: 2, why: "El IGBT es el rey de la electrónica de potencia industrial." },
  { id: 248, type: "truefalse", q: "En un transistor PNP, el colector debe ser más positivo que el emisor.", correct: false, why: "Debe ser más negativo; es el opuesto simétrico del NPN." },
  { id: 249, type: "multiple", q: "El 'ruido' térmico en transistores se conoce como:", options: ["Ruido Blanco", "Ruido Rosa", "Ruido de Johnson-Nyquist", "Zumbido"], correct: 2, why: "Producido por el movimiento aleatorio de electrones por calor." },
  { id: 250, type: "fill", q: "La técnica de usar un MOSFET canal N y uno canal P juntos es ___", correct: "cmos", why: "Complementary MOS, base de toda la lógica digital moderna por su bajo consumo." },

  // --- BLOQUE 6: AMPLIFICADORES OPERACIONALES Y ANALÓGICA (251-300) ---
  { id: 251, type: "multiple", q: "Un Op-Amp ideal tiene una ganancia de lazo abierto de:", options: ["100", "10,000", "Infinita", "Cero"], correct: 2, why: "Se asume infinita para facilitar los cálculos de diseño con realimentación." },
  { id: 252, type: "fill", q: "Los dos terminales de entrada de un Op-Amp se llaman inversora y ___", correct: "no inversora", why: "Identificadas con los símbolos (-) y (+) respectivamente." },
  { id: 253, type: "truefalse", q: "En un Op-Amp con realimentación negativa, el voltaje en ambas entradas es el mismo.", correct: true, why: "Es el concepto de 'tierra virtual' o cortocircuito virtual." },
  { id: 254, type: "multiple", q: "La impedancia de entrada de un Op-Amp ideal es:", options: ["0 Ω", "50 Ω", "Infinita", "1 MΩ"], correct: 2, why: "No drena ninguna corriente de la fuente de señal." },
  { id: 255, type: "multiple", q: "Un seguidor de voltaje tiene una ganancia de:", options: ["Infinita", "Cero", "1", "-1"], correct: 2, why: "La salida sigue exactamente a la entrada, usado para adaptación de impedancia." },
  { id: 256, type: "fill", q: "El amplificador que suma varias señales se llama amplificador ___", correct: "sumador", why: "Basado en la configuración inversora con múltiples resistencias de entrada." },
  { id: 257, type: "multiple", q: "Para un amplificador inversor con Rentrada=1k y Rfeedback=10k, la ganancia es:", options: ["10", "-10", "11", "0.1"], correct: 1, why: "Ganancia Av = -Rf / Rin = -10/1 = -10." },
  { id: 258, type: "truefalse", q: "El ancho de banda de un Op-Amp disminuye si aumentamos la ganancia.", correct: true, why: "El producto Ganancia-Ancho de Banda (GBW) es constante para un modelo dado." },
  { id: 259, type: "multiple", q: "El CMRR en un Op-Amp mide la capacidad de rechazar:", options: ["Ruido de alta frecuencia", "Señales comunes a ambas entradas", "Calor excesivo", "Bajos voltajes"], correct: 1, why: "Common Mode Rejection Ratio: vital para limpiar señales pequeñas en ambientes ruidosos." },
  { id: 260, type: "fill", q: "Un circuito que integra la señal de entrada en el tiempo es un ___", correct: "integrador", why: "Usa un capacitor en el lazo de realimentación." },
  { id: 261, type: "multiple", q: "El Slew Rate de un Op-Amp se mide en:", options: ["V/s", "V/μs", "A/ms", "Hz"], correct: 1, why: "Indica qué tan rápido puede cambiar el voltaje de salida ante un salto en la entrada." },
  { id: 262, type: "truefalse", q: "Un comparador usa realimentación negativa.", correct: false, why: "Suele usar lazo abierto o realimentación positiva (histéresis) para cambios bruscos." },
  { id: 263, type: "multiple", q: "El CI 741 es un famoso:", options: ["Temporizador", "Amplificador Operacional", "Regulador de voltaje", "Microcontrolador"], correct: 1, why: "Es el Op-Amp más icónico y educativo de la historia." },
  { id: 264, type: "fill", q: "Un amplificador de instrumentación suele estar formado por ___ Op-Amps.", correct: "tres", why: "Ofrece altísima impedancia de entrada y un CMRR excelente." },
  { id: 265, type: "multiple", q: "La configuración No Inversora con Rf=9k y Rin=1k tiene ganancia:", options: ["9", "10", "11", "1"], correct: 1, why: "Av = 1 + (Rf / Rin) = 1 + 9 = 10." },
  { id: 266, type: "truefalse", q: "Un Op-Amp puede funcionar con una sola fuente (VCC y GND).", correct: true, why: "Existen modelos 'Single Supply' (como el LM358) o usando un divisor resistivo de referencia." },
  { id: 267, type: "multiple", q: "El 'Offset' de voltaje en un Op-Amp real causa:", options: ["Más velocidad", "Un pequeño voltaje de salida cuando la entrada es cero", "Ruido rosa", "Explosiones"], correct: 1, why: "Es debido a las imperfecciones de fabricación en los transistores internos." },
  { id: 268, type: "fill", q: "El circuito que produce una salida proporcional a la derivada de la entrada es el ___", correct: "diferenciador", why: "Detecta cambios rápidos en la señal." },
  { id: 269, type: "multiple", q: "¿Qué componente define la ganancia en un amplificador logarítmico?", options: ["Resistor de precisión", "Diodo o transistor", "Capacitor de tantalio", "Inductor"], correct: 1, why: "Aprovecha la relación exponencial V-I de una unión PN." },
  { id: 270, type: "truefalse", q: "Un filtro activo usa componentes como Op-Amps para dar ganancia además de filtrar.", correct: true, why: "A diferencia de los filtros pasivos, estos no atenúan la señal en la banda de paso." },
  { id: 271, type: "multiple", q: "Un filtro de Butterworth se caracteriza por tener:", options: ["Picos en la banda de paso", "Respuesta plana en la banda de paso", "Caída muy lenta", "Fase aleatoria"], correct: 1, why: "Es el filtro 'máximamente plano'." },
  { id: 272, type: "fill", q: "El CI 555 se usa principalmente como ___", correct: "temporizador", why: "O oscilador, muy versátil para generar pulsos y retardos." },
  { id: 273, type: "multiple", q: "En un 555 en modo astable, la salida es:", options: ["Voltaje DC constante", "Onda cuadrada", "Onda senoidal", "Pulso único"], correct: 1, why: "Oscila continuamente entre alto y bajo." },
  { id: 274, type: "truefalse", q: "Un regulador 7805 entrega una salida fija de 5V.", correct: true, why: "Es un regulador lineal positivo de la serie 78xx." },
  { id: 275, type: "multiple", q: "Un regulador conmutado (Switching) es más eficiente que uno lineal porque:", options: ["Es más pequeño", "El transistor actúa como switch (on/off) disipando menos calor", "Usa transformadores de 50Hz", "Es más barato"], correct: 1, why: "Al no trabajar en zona activa, no desperdicia energía como calor en forma de caída de voltaje." },
  { id: 276, type: "fill", q: "La unidad de medida de la rapidez de un Op-Amp es el V por ___", correct: "microsegundo", why: "Indica el Slew Rate." },

  { id: 495, type: "multiple", q: "Un sistema UPS sirve para:", options: ["Aumentar la potencia", "Proporcionar energía de respaldo ante fallos de red", "Subir el voltaje", "Medir corriente"], correct: 1, why: "Uninterruptible Power Supply, usa baterías e inversores." },
  { id: 496, type: "fill", q: "El protocolo inalámbrico para distancias ultra cortas y pagos es el ___", correct: "nfc", why: "Near Field Communication." },
  { id: 497, type: "multiple", q: "¿Qué es un 'Encoder Absoluto'?", options: ["Uno que siempre dice la verdad", "Uno que sabe su posición exacta incluso tras apagarse", "Uno que es muy grande", "Uno barato"], correct: 1, why: "Usa un código único por cada ángulo, no necesita 'ir a casa' (homing)." },
  { id: 498, type: "truefalse", q: "La fibra óptica usa señales eléctricas para transmitir datos.", correct: false, why: "Usa pulsos de luz para evitar interferencias y viajar a gran velocidad." },
  { id: 499, type: "multiple", q: "Un motor 'Torque' está diseñado para:", options: ["Ir muy rápido", "Mantener mucha fuerza a bajas revoluciones o estático", "Volar", "Gastar mucha gasolina"], correct: 1, why: "Optimizado para fuerza sostenida." },
  { id: 500, type: "fill", q: "¡Felicidades! Has completado el banco de preguntas de ___", correct: "electromaster", why: "Has demostrado ser un experto en electrónica, robótica y control." }
];

        // Llenar dinámicamente hasta 500 basado en tus preguntas reales (repitiendo o variando)
        const QUESTIONS_DB = [];
        for(let i=0; i<500; i++) {
            const baseQ = USER_QUESTIONS[i % USER_QUESTIONS.length];
            QUESTIONS_DB.push({
                id: i + 1,
                q: i < USER_QUESTIONS.length ? baseQ.q : `Reto ${i+1}: ${baseQ.q}`,
                a: baseQ.a,
                correct: baseQ.correct
            });
        }

        // --- ESTADO ---
        let state = {
            xp: parseInt(localStorage.getItem('em_xp')) || 0,
            lives: parseInt(localStorage.getItem('em_lives')) || 5,
            progress: parseInt(localStorage.getItem('em_progress')) || 1,
            currentQuiz: null,
            selectedOption: null
        };

        // --- RENDER MAPA ---
        function renderMap() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            
            for (let i = 1; i <= 500; i++) {
                const node = document.createElement('div');
                const isLocked = i > state.progress;
                const isCompleted = i < state.progress;
                const isCurrent = i === state.progress;

                node.className = `node ${isLocked ? 'node-locked' : (isCompleted ? 'node-completed' : 'node-active')} ${isCurrent ? 'current-anim' : ''}`;
                
                // Efecto Zig-Zag
                const offset = Math.sin(i * 0.8) * 60; 
                node.style.transform = `translateX(${offset}px)`;

                node.innerHTML = isLocked ? '<i class="fas fa-lock"></i>' : (isCompleted ? '<i class="fas fa-check"></i>' : `<b>${i}</b>`);
                
                if (!isLocked) node.onclick = () => openQuiz(i);
                container.appendChild(node);
            }
        }

        // --- LÓGICA QUIZ ---
        function openQuiz(id) {
            if (state.lives <= 0) return openStore();
            
            state.currentQuiz = QUESTIONS_DB.find(q => q.id === id);
            state.selectedOption = null;
            
            document.getElementById('quiz-screen').style.display = 'flex';
            document.getElementById('question-text').innerText = state.currentQuiz.q;
            
            const optionsHtml = state.currentQuiz.a.map((opt, i) => `
                <button onclick="selectOption(${i})" class="option-card" data-idx="${i}">
                    <span class="w-8 h-8 rounded-lg border-2 border-inherit flex items-center justify-center text-xs">${i+1}</span>
                    ${opt}
                </button>
            `).join('');
            
            document.getElementById('options-container').innerHTML = optionsHtml;
            document.getElementById('check-btn').disabled = true;
            document.getElementById('check-btn').classList.add('opacity-50', 'bg-[#37464f]');
            document.getElementById('quiz-progress').style.width = `${(id / 500) * 100}%`;
        }

        function selectOption(idx) {
            state.selectedOption = idx;
            document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
            document.querySelector(`[data-idx="${idx}"]`).classList.add('selected');
            
            const btn = document.getElementById('check-btn');
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'bg-[#37464f]');
            btn.classList.add('bg-[#58cc02]');
        }

        function validateAnswer() {
            const isCorrect = state.selectedOption === state.currentQuiz.correct;
            const panel = document.getElementById('feedback-panel');
            const nextBtn = document.getElementById('next-btn');

            if (isCorrect) {
                panel.className = "feedback-panel fixed bottom-0 left-0 w-full p-6 bg-[#d7ffb8] text-[#58cc02] show z-[120]";
                document.getElementById('feedback-title').innerText = "¡Excelente!";
                document.getElementById('feedback-icon').innerHTML = '<i class="fas fa-check text-green-500 text-xl"></i>';
                nextBtn.className = "btn-3d w-full py-4 rounded-2xl font-black text-lg bg-[#58cc02] text-white";
                nextBtn.innerText = "CONTINUAR";
                nextBtn.onclick = handleSuccess;
                confetti({ particleCount: 40, spread: 60, origin: { y: 0.8 } });
            } else {
                state.lives--;
                save();
                updateStats();
                panel.className = "feedback-panel fixed bottom-0 left-0 w-full p-6 bg-[#ffdfe0] text-[#ff4b4b] show z-[120]";
                document.getElementById('feedback-title').innerText = "Incorrecto";
                document.getElementById('feedback-msg').innerText = `La respuesta era: ${state.currentQuiz.a[state.currentQuiz.correct]}`;
                document.getElementById('feedback-icon').innerHTML = '<i class="fas fa-times text-red-500 text-xl"></i>';
                nextBtn.className = "btn-3d w-full py-4 rounded-2xl font-black text-lg bg-[#ff4b4b] text-white";
                nextBtn.innerText = "ENTENDIDO";
                nextBtn.onclick = () => { closeQuiz(); if(state.lives <= 0) openStore(); };
            }
        }

        function handleSuccess() {
            if (state.currentQuiz.id === state.progress) {
                state.progress++;
                state.xp += 10;
                save();
                updateStats();
            }
            closeQuiz();
            renderMap();
        }

        function closeQuiz() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('feedback-panel').classList.remove('show');
        }

        function confirmExit() {
            if(confirm("¿Seguro que quieres salir?")) closeQuiz();
        }

        function openStore() { document.getElementById('store-modal').classList.remove('hidden'); }
        function closeStore() { document.getElementById('store-modal').classList.add('hidden'); }

        function watchAd() {
            window.open("https://www.google.com", "_blank"); // Cambiar por tu link de publicidad
            setTimeout(() => {
                state.lives = Math.min(state.lives + 1, 5);
                save();
                updateStats();
                closeStore();
            }, 2000);
        }

        function save() {
            localStorage.setItem('em_xp', state.xp);
            localStorage.setItem('em_lives', state.lives);
            localStorage.setItem('em_progress', state.progress);
        }

        function updateStats() {
            document.getElementById('xp-count').innerText = state.xp;
            document.getElementById('life-count').innerText = state.lives;
        }

        window.onload = () => {
            renderMap();
            updateStats();
            window.scrollTo(0, document.body.scrollHeight);
        };
    </script>
</body>
</html>
