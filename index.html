<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ElectroMaster PRO | Curso Completo</title>
    
    <!-- PayPal SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=BAAfL26d5SicSjimR9qBK_7H7To8HiLp0a8OllLcR7_WNeyZaXxHZrIhsBLlUT96GMSBhLuN0un3kw-aK8&components=hosted-buttons&disable-funding=venmo&currency=MXN"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        
        :root {
            --primary: #58cc02;
            --secondary: #1cb0f6;
            --danger: #ff4b4b;
            --bg: #131f24;
            --card: #202f36;
            --border: #37464f;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .btn-3d {
            border-bottom: 5px solid rgba(0,0,0,0.3);
            transition: all 0.1s;
        }
        .btn-3d:active {
            border-bottom-width: 0;
            transform: translateY(5px);
        }

        .map-container {
            display: flex;
            flex-direction: column-reverse; 
            align-items: center;
            padding: 120px 0;
            gap: 45px;
            position: relative;
        }

        .node {
            width: 85px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .node-active {
            background: var(--primary);
            border-bottom: 8px solid #46a302;
            box-shadow: 0 0 25px rgba(88, 204, 2, 0.4);
        }

        .node-locked {
            background: #37464f;
            border-bottom: 8px solid #202f36;
            color: #52656d;
            cursor: not-allowed;
        }

        .node-completed {
            background: var(--secondary);
            border-bottom: 8px solid #1899d6;
        }

        .quiz-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            display: none;
            flex-direction: column;
        }

        .option-card {
            background: var(--card);
            border: 2px solid var(--border);
            border-bottom: 6px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            text-align: left;
            font-weight: 800;
            transition: 0.1s;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .option-card.selected {
            background: rgba(28, 176, 246, 0.1);
            border-color: var(--secondary);
            color: var(--secondary);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.05); }
        }
        .current-anim {
            animation: bounce 2s infinite ease-in-out;
        }

        .feedback-panel {
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .feedback-panel.show {
            transform: translateY(0);
        }

        .level-tag {
            position: absolute;
            top: -25px;
            background: #37464f;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 900;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <!-- Header Stats -->
    <nav class="fixed top-0 left-0 w-full h-16 bg-[#131f24] border-b-2 border-[#37464f] z-50 flex items-center justify-between px-6">
        <div class="flex items-center gap-3">
            <i class="fas fa-bolt text-orange-500 text-xl"></i>
            <span id="xp-count" class="font-black text-orange-500 text-lg">0</span>
        </div>
        <div class="flex items-center gap-4">
            <div onclick="openStore()" class="flex items-center gap-2 bg-[#202f36] px-4 py-1.5 rounded-2xl border-b-2 border-[#37464f] cursor-pointer">
                <i class="fas fa-heart text-red-500"></i>
                <span id="life-count" class="font-black text-red-500">5</span>
            </div>
        </div>
    </nav>

    <!-- Mapa -->
    <div id="game-map" class="overflow-y-auto h-screen">
        <div id="nodes-container" class="map-container"></div>
    </div>

    <!-- Pantalla Quiz -->
    <div id="quiz-screen" class="quiz-overlay">
        <div class="p-4 flex items-center gap-4">
            <button onclick="confirmExit()" class="text-gray-500 text-3xl px-2">×</button>
            <div class="h-4 bg-[#202f36] rounded-full flex-1 overflow-hidden">
                <div id="quiz-progress" class="h-full bg-[#58cc02] w-0 transition-all duration-500"></div>
            </div>
        </div>

        <div class="flex-1 px-6 py-8 overflow-y-auto">
            <div id="category-label" class="text-blue-400 font-black text-sm uppercase mb-2">NIVEL BÁSICO</div>
            <h2 id="question-text" class="text-2xl font-black mb-8 leading-tight"></h2>
            <div id="options-container" class="grid gap-4"></div>
        </div>

        <div class="p-6 border-t-2 border-[#37464f] bg-[#131f24]">
            <button id="check-btn" onclick="validateAnswer()" disabled class="btn-3d w-full bg-[#37464f] py-4 rounded-2xl font-black text-white text-lg opacity-50">
                COMPROBAR
            </button>
        </div>

        <div id="feedback-panel" class="feedback-panel fixed bottom-0 left-0 w-full p-6 z-[110] border-t-4">
            <div class="flex items-center gap-4 mb-6">
                <div id="feedback-icon" class="w-12 h-12 rounded-full flex items-center justify-center bg-white shadow-lg"></div>
                <div>
                    <h3 id="feedback-title" class="text-2xl font-black"></h3>
                    <p id="feedback-msg" class="font-bold opacity-90"></p>
                </div>
            </div>
            <button id="next-btn" class="btn-3d w-full py-4 rounded-2xl font-black text-lg text-white shadow-lg"></button>
        </div>
    </div>

    <!-- Modal de Tienda (Opciones: Gratis vs Pago) -->
    <div id="store-modal" class="fixed inset-0 z-[200] bg-black/95 hidden flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-[#202f36] w-full max-w-sm rounded-3xl p-8 border-2 border-[#37464f] text-center shadow-2xl">
            <div class="relative inline-block mb-4">
                <i class="fas fa-heart text-red-500 text-6xl"></i>
            </div>
            <h2 class="text-2xl font-black mb-1 text-white">Recarga Energía</h2>
            <p class="text-gray-400 mb-6 font-bold text-sm italic">Elige tu método preferido</p>
            
            <!-- OPCIÓN 1: GRATIS CON ANUNCIO -->
            <div class="mb-8 p-4 bg-[#131f24] rounded-2xl border border-[#37464f]">
                <p class="text-xs font-black text-[#58cc02] uppercase mb-2">Opción Gratis</p>
                <button onclick="watchAd()" class="btn-3d w-full bg-[#58cc02] py-3 rounded-xl font-black text-white flex items-center justify-center gap-2">
                    <i class="fas fa-play-circle"></i> VER VIDEO +1 VIDA
                </button>
            </div>

            <div class="flex items-center gap-2 mb-8 text-gray-500">
                <hr class="flex-1 border-[#37464f]">
                <span class="text-[10px] font-black">O TAMBIÉN</span>
                <hr class="flex-1 border-[#37464f]">
            </div>

            <!-- OPCIÓN 2: PAGO PAYPAL -->
            <div class="mb-4">
                <p class="text-xs font-black text-[#1cb0f6] uppercase mb-2">Apoya el proyecto ($5 MXN)</p>
                <div id="paypal-container-5TDC2UAK2F3Q2"></div>
            </div>
            
            <button onclick="closeStore()" class="mt-4 text-gray-500 font-bold hover:text-white uppercase tracking-widest text-[10px]">Cerrar Tienda</button>
        </div>
    </div>

    <script>
        // Configuración Adsterra y PayPal
        const SMART_LINK = "https://www.profitablecpmratenetwork.com/gcxmcudfh3?key=86df4fa2db61ded8b48c42d6dca5f47a";

        if (window.paypal) {
            paypal.HostedButtons({
                hostedButtonId: "5TDC2UAK2F3Q2",
                onApprove: function(data, actions) {
                    addLife("¡Gracias por tu compra!");
                }
            }).render("#paypal-container-5TDC2UAK2F3Q2");
        }

        function watchAd() {
            // Abrir link de Adsterra
            window.open(SMART_LINK, "_blank");
            
            // Simular carga y otorgar vida
            setTimeout(() => {
                addLife("¡Vida recargada por ver el video!");
            }, 1000);
        }

        function addLife(msg) {
            if(state.lives < 5) {
                state.lives++;
                save();
                updateStats();
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.3 } });
                if(msg) alert(msg);
                closeStore();
            } else {
                alert("Ya tienes el máximo de vidas (5)");
            }
        }

        // --- PREGUNTAS DB ---
        const QUESTIONS_DB = [
            { id: 1, cat: "Básico", q: "¿Qué partícula del átomo tiene carga negativa y genera la electricidad?", a: ["Protón", "Neutrón", "Electrón", "Núcleo"], correct: 2 },

            { id: 7, cat: "Básico", q: "¿Qué símbolo representa al Ohmio?", a: ["α", "β", "Ω", "Σ"], correct: 2 },
            { id: 8, cat: "Básico", q: "¿Cómo se llama el flujo de electrones a través de un conductor?", a: ["Tensión", "Potencia", "Corriente", "Resistencia"], correct: 2 },
            { id: 9, cat: "Básico", q: "¿Qué herramienta se usa para pelar cables?", a: ["Martillo", "Alicate pelacables", "Destornillador", "Nivel"], correct: 1 },
            { id: 10, cat: "Básico", q: "¿Cuál es el color estándar del cable de Tierra?", a: ["Rojo", "Azul", "Verde/Amarillo", "Negro"], correct: 2 },
            { id: 11, cat: "Básico", q: "¿Qué es un aislante?", a: ["Material que permite el paso de luz", "Material que impide el flujo eléctrico", "Un tipo de metal", "Un cable desnudo"], correct: 1 },
            { id: 12, cat: "Básico", q: "¿Cuántos polos tiene un imán?", a: ["Uno", "Dos (Norte y Sur)", "Cuatro", "Ninguno"], correct: 1 },
            { id: 13, cat: "Básico", q: "¿Qué significa AC en electricidad?", a: ["Alta Corriente", "Corriente Alterna", "Corriente Acumulada", "Área de Carga"], correct: 1 },
            { id: 14, cat: "Básico", q: "¿Qué significa DC?", a: ["Doble Carga", "Corriente Directa", "Diodo de Carga", "Diferencia Central"], correct: 1 },
            { id: 15, cat: "Básico", q: "¿Cuál es la tensión común en un hogar en la mayoría de Latinoamérica?", a: ["5V", "12V", "110V/220V", "1000V"], correct: 2 },
            { id: 16, cat: "Intermedio", q: "Según la Ley de Ohm, si la resistencia aumenta:", a: ["La corriente aumenta", "La corriente disminuye", "El voltaje sube", "Nada cambia"], correct: 1 },
            { id: 17, cat: "Intermedio", q: "¿Qué dispositivo protege un circuito fundiéndose?", a: ["Interruptor", "Transformador", "Fusible", "Relé"], correct: 2 },
            { id: 18, cat: "Intermedio", q: "¿Qué instrumento mide múltiples magnitudes (V, A, Ω)?", a: ["Osciloscopio", "Multímetro", "Vatímetro", "Fasímetro"], correct: 1 },
            { id: 19, cat: "Intermedio", q: "En un circuito en SERIE, si una bombilla se quema:", a: ["Las demás brillan más", "Las demás se apagan", "El voltaje aumenta", "Siguen encendidas"], correct: 1 },
            { id: 20, cat: "Intermedio", q: "En un circuito en PARALELO, el voltaje en cada rama es:", a: ["Diferente", "Igual al de la fuente", "Se divide", "Cero"], correct: 1 },
            { id: 21, cat: "Intermedio", q: "¿Qué componente almacena energía en un campo eléctrico?", a: ["Resistencia", "Capacitor", "Inductor", "Transistor"], correct: 1 },
            { id: 22, cat: "Intermedio", q: "¿Qué componente almacena energía en un campo magnético?", a: ["Capacitor", "Diodo", "Inductor", "Led"], correct: 2 },
            { id: 23, cat: "Intermedio", q: "¿Cuál es la unidad de la Potencia Eléctrica?", a: ["Watt", "Joule", "Newton", "Tesla"], correct: 0 },
            { id: 24, cat: "Intermedio", q: "¿Qué hace un transformador?", a: ["Crea energía", "Cambia el nivel de voltaje", "Convierte AC a DC", "Mide la corriente"], correct: 1 },
            { id: 25, cat: "Intermedio", q: "¿Qué es un cortocircuito?", a: ["Un circuito pequeño", "Unión accidental de polos sin carga", "Un ahorro", "Un interruptor"], correct: 1 },
            { id: 26, cat: "Intermedio", q: "¿Para qué sirve el Relé?", a: ["Controlar alta potencia con baja", "Aumentar voltaje", "Iluminar", "Filtrar"], correct: 0 },
            { id: 27, cat: "Intermedio", q: "¿Cuál es la frecuencia común en Hz?", a: ["10-20 Hz", "50-60 Hz", "120-150 Hz", "1000 Hz"], correct: 1 },
            { id: 28, cat: "Intermedio", q: "¿Qué mide un Vatímetro?", a: ["Tensión", "Resistencia", "Potencia Activa", "Capacidad"], correct: 2 },
            { id: 29, cat: "Intermedio", q: "¿Qué indica la Ley de Joule?", a: ["Luz", "Calor por corriente", "Velocidad", "Presión"], correct: 1 },
            { id: 30, cat: "Intermedio", q: "¿Qué semiconductor solo permite un sentido?", a: ["Resistor", "Diodo", "Capacitor", "Cable"], correct: 1 },
            { id: 31, cat: "Intermedio", q: "¿Qué es la Ley de Kirchhoff de Corrientes?", a: ["Suma de corrientes es cero", "V=IxR", "P=VxI", "E=mc2"], correct: 0 },

            { id: 34, cat: "Intermedio", q: "¿Cómo se calcula la potencia (P)?", a: ["V / I", "V + I", "V * I", "R * I"], correct: 2 },
            { id: 35, cat: "Intermedio", q: "¿Qué cable lleva la carga a tierra?", a: ["Neutro", "Fase", "Tierra", "Retorno"], correct: 2 },
            { id: 36, cat: "Avanzado", q: "¿Qué es el Factor de Potencia?", a: ["Eficiencia de uso", "Voltaje máximo", "Velocidad", "Tipo de cable"], correct: 0 },
            { id: 37, cat: "Avanzado", q: "¿Cuál es la unidad de la Inductancia?", a: ["Ohmio", "Faradio", "Henrio", "Tesla"], correct: 2 },
            { id: 38, cat: "Avanzado", q: "¿Qué sucede en un sistema trifásico equilibrado?", a: ["Neutro lleva carga", "Suma de corrientes es cero", "Hay 4 fases", "No hay tierra"], correct: 1 },
            { id: 39, cat: "Avanzado", q: "¿Qué es un puente de diodos?", a: ["Amplificador", "Rectificador", "Fusible", "Motor"], correct: 1 },
            { id: 40, cat: "Avanzado", q: "¿Componente con Emisor, Base y Colector?", a: ["Diodo", "Transistor BJT", "Triac", "Termistor"], correct: 1 },
            { id: 41, cat: "Avanzado", q: "¿Qué es la Reactancia Inductiva?", a: ["Oposición al cambio de corriente", "Calor", "Luz", "Fuerza"], correct: 0 },
            { id: 42, cat: "Avanzado", q: "¿Qué es un PLC?", a: ["Cable", "Controlador Lógico Programable", "Placa", "Pérdida"], correct: 1 },
            { id: 43, cat: "Avanzado", q: "¿Qué mide la Impedancia?", a: ["Resistencia DC", "Oposición total AC", "Magnetismo", "Frecuencia"], correct: 1 },
            { id: 44, cat: "Avanzado", q: "¿Para qué sirve el condensador de arranque?", a: ["Ahorrar luz", "Torque inicial motor", "Bajar voltaje", "Corte"], correct: 1 },
            { id: 45, cat: "Avanzado", q: "¿Qué es el Efecto Hall?", a: ["Voltaje por campo magnético", "Calentamiento", "Resistencia", "Luz"], correct: 0 },
            { id: 46, cat: "Avanzado", q: "¿Qué hace un Variador de Frecuencia (VFD)?", a: ["Mide tierra", "Controla velocidad motor AC", "Carga", "Fusible"], correct: 1 },
            { id: 47, cat: "Avanzado", q: "¿Qué es la Potencia Reactiva?", a: ["La útil", "La que oscila", "La total", "Energía solar"], correct: 1 },
            { id: 48, cat: "Avanzado", q: "¿Ventaja del LED sobre incandescencia?", a: ["Peso", "Eficiencia lumínica", "Más corriente", "Más antiguo"], correct: 1 },
            { id: 49, cat: "Avanzado", q: "¿Qué unidad mide el flujo luminoso?", a: ["Lux", "Lumen", "Candela", "Watt"], correct: 1 },
            { id: 50, cat: "Avanzado", q: "¿Primera regla de oro de seguridad?", a: ["Guantes", "Corte efectivo tensión", "Extintor", "Llamar"], correct: 1 }
        ];

        // --- ESTADO Y LOGICA MAPA ---
        let state = {
            xp: parseInt(localStorage.getItem('em_xp')) || 0,
            lives: parseInt(localStorage.getItem('em_lives')) || 5,
            progress: parseInt(localStorage.getItem('em_progress')) || 1,
            currentQuiz: null,
            selectedOption: null
        };

        function renderMap() {
            const container = document.getElementById('nodes-container');
            container.innerHTML = '';
            QUESTIONS_DB.forEach((q, index) => {
                const i = index + 1;
                const node = document.createElement('div');
                const isLocked = i > state.progress;
                const isCompleted = i < state.progress;
                const isCurrent = i === state.progress;
                node.className = `node ${isLocked ? 'node-locked' : (isCompleted ? 'node-completed' : 'node-active')} ${isCurrent ? 'current-anim' : ''}`;
                const offset = Math.sin(i * 0.8) * 65; 
                node.style.transform = `translateX(${offset}px)`;
                if(i === 1) node.innerHTML += '<span class="level-tag">INICIO</span>';
                if(i === 16) node.innerHTML += '<span class="level-tag">INTERMEDIO</span>';
                if(i === 36) node.innerHTML += '<span class="level-tag">EXPERTO</span>';
                node.innerHTML += isLocked ? '<i class="fas fa-lock text-sm"></i>' : (isCompleted ? '<i class="fas fa-check"></i>' : `<b>${i}</b>`);
                if (!isLocked) node.onclick = () => openQuiz(i);
                container.appendChild(node);
            });
        }

        function openQuiz(id) {
            if (state.lives <= 0) return openStore();
            state.currentQuiz = QUESTIONS_DB.find(q => q.id === id);
            state.selectedOption = null;
            document.getElementById('quiz-screen').style.display = 'flex';
            document.getElementById('category-label').innerText = `NIVEL: ${state.currentQuiz.cat}`;
            document.getElementById('question-text').innerText = state.currentQuiz.q;
            const optionsHtml = state.currentQuiz.a.map((opt, i) => `
                <button onclick="selectOption(${i})" class="option-card" data-idx="${i}">
                    <span class="w-8 h-8 rounded-lg border-2 border-inherit flex items-center justify-center text-xs font-black">${String.fromCharCode(65 + i)}</span>
                    <span class="flex-1">${opt}</span>
                </button>
            `).join('');
            document.getElementById('options-container').innerHTML = optionsHtml;
            document.getElementById('check-btn').disabled = true;
            document.getElementById('check-btn').classList.add('opacity-50', 'bg-[#37464f]');
            document.getElementById('quiz-progress').style.width = `${(id / QUESTIONS_DB.length) * 100}%`;
        }

        function selectOption(idx) {
            state.selectedOption = idx;
            document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
            document.querySelector(`[data-idx="${idx}"]`).classList.add('selected');
            const btn = document.getElementById('check-btn');
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'bg-[#37464f]');
            btn.classList.add('bg-[#58cc02]');
        }

        function validateAnswer() {
            const isCorrect = state.selectedOption === state.currentQuiz.correct;
            const panel = document.getElementById('feedback-panel');
            const nextBtn = document.getElementById('next-btn');
            if (isCorrect) {
                panel.className = "feedback-panel fixed bottom-0 left-0 w-full p-6 bg-[#d7ffb8] text-[#58cc02] border-[#a5d6a7] show z-[120]";
                document.getElementById('feedback-title').innerText = "¡Buen trabajo!";
                document.getElementById('feedback-msg').innerText = "Has dominado este concepto.";
                document.getElementById('feedback-icon').innerHTML = '<i class="fas fa-check text-green-600 text-xl"></i>';
                nextBtn.className = "btn-3d w-full py-4 rounded-2xl font-black text-lg bg-[#58cc02] text-white";
                nextBtn.innerText = "CONTINUAR";
                nextBtn.onclick = handleSuccess;
                confetti({ particleCount: 50, spread: 70, origin: { y: 0.8 } });
            } else {
                state.lives--;
                save();
                updateStats();
                panel.className = "feedback-panel fixed bottom-0 left-0 w-full p-6 bg-[#ffdfe0] text-[#ff4b4b] border-[#ef9a9a] show z-[120]";
                document.getElementById('feedback-title').innerText = "¡Ánimo!";
                document.getElementById('feedback-msg').innerText = `Correcta: ${state.currentQuiz.a[state.currentQuiz.correct]}`;
                document.getElementById('feedback-icon').innerHTML = '<i class="fas fa-times text-red-600 text-xl"></i>';
                nextBtn.className = "btn-3d w-full py-4 rounded-2xl font-black text-lg bg-[#ff4b4b] text-white";
                nextBtn.innerText = "ENTENDIDO";
                nextBtn.onclick = () => { closeQuiz(); if(state.lives <= 0) openStore(); };
            }
        }

        function handleSuccess() {
            if (state.currentQuiz.id === state.progress) {
                state.progress++;
                state.xp += 15;
                save();
                updateStats();
            }
            closeQuiz();
            renderMap();
        }

        function closeQuiz() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('feedback-panel').classList.remove('show');
        }

        function confirmExit() { if(confirm("Si sales perderás el progreso.")) closeQuiz(); }
        function openStore() { document.getElementById('store-modal').classList.remove('hidden'); }
        function closeStore() { document.getElementById('store-modal').classList.add('hidden'); }

        function save() {
            localStorage.setItem('em_xp', state.xp);
            localStorage.setItem('em_lives', state.lives);
            localStorage.setItem('em_progress', state.progress);
        }

        function updateStats() {
            document.getElementById('xp-count').innerText = state.xp;
            document.getElementById('life-count').innerText = state.lives;
        }

        window.onload = () => {
            renderMap();
            updateStats();
            setTimeout(() => {
                const current = document.querySelector('.current-anim');
                if(current) current.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 500);
        };
    </script>
</body>
</html>
