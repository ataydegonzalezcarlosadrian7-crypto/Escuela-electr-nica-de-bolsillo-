<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ElectroMaster PRO | Enterprise Learning</title>
    
    <!-- SDK PAYPAL -->
    <script src="https://www.paypal.com/sdk/js?client-id=BAAfL26d5SicSjimR9qBK_7H7To8HiLp0a8OllLcR7_WNeyZaXxHZrIhsBLlUT96GMSBhLuN0un3kw-aK8&components=hosted-buttons&disable-funding=venmo&currency=MXN"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap');
        
        :root {
            --bg-dark: #0f172a;
            --surface: #1e293b;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .level-node {
            width: 70px;
            height: 70px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 10;
        }

        .level-node.locked {
            filter: grayscale(1) opacity(0.3);
            cursor: not-allowed;
        }

        .level-node.completed {
            background: var(--success);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
            color: white;
        }

        .level-node.current {
            background: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
            transform: scale(1.1);
            color: white;
        }

        .option-card {
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .option-card.selected {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.15);
        }

        .option-card.correct {
            background: rgba(16, 185, 129, 0.2) !important;
            border-color: var(--success) !important;
        }

        .option-card.wrong {
            background: rgba(239, 68, 68, 0.2) !important;
            border-color: var(--danger) !important;
        }

        .explanation-box {
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header UI -->
    <header class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                <i class="fas fa-bolt text-white"></i>
            </div>
            <div>
                <h1 class="font-extrabold text-lg leading-none tracking-tight">ELECTRO<span class="text-blue-500">PRO</span></h1>
                <p class="text-[9px] text-slate-400 font-mono uppercase tracking-[0.2em]">Industrial Training</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4 bg-slate-900/80 px-4 py-2 rounded-2xl border border-white/5 shadow-inner">
            <div class="flex items-center gap-2">
                <i class="fas fa-heart text-red-500"></i>
                <span id="life-count" class="font-bold text-sm">3</span>
            </div>
            <div class="w-[1px] h-4 bg-white/10"></div>
            <div class="flex items-center gap-2 text-yellow-500">
                <i class="fas fa-star"></i>
                <span id="star-count" class="font-bold text-sm">0</span>
            </div>
        </div>
    </header>

    <main class="flex-grow">
        <!-- Mapa de Niveles -->
        <section id="view-map" class="p-8 max-w-lg mx-auto">
            <div class="mb-12 text-center">
                <h2 class="text-3xl font-extrabold mb-2 bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">Certificación PRO</h2>
                <p class="text-slate-500 text-sm">Domina los 100 niveles de ingeniería electrónica</p>
            </div>
            
            <div id="levels-container" class="relative flex flex-col items-center gap-12 pb-24">
                <!-- Inyectado dinámicamente -->
            </div>
        </section>

        <!-- Quiz Interface -->
        <section id="view-quiz" class="hidden fixed inset-0 z-[60] bg-slate-950 flex flex-col">
            <div class="p-5 border-b border-white/5 flex items-center justify-between glass">
                <button onclick="exitQuiz()" class="text-slate-500 hover:text-white transition-colors">
                    <i class="fas fa-arrow-left text-xl"></i>
                </button>
                <div class="flex-grow max-w-md mx-8">
                    <div class="h-1.5 bg-slate-800 rounded-full overflow-hidden">
                        <div id="quiz-bar" class="h-full bg-blue-500 transition-all duration-700 w-0"></div>
                    </div>
                </div>
                <div class="text-[10px] font-mono text-slate-500 bg-slate-900 px-3 py-1 rounded-md border border-white/5" id="level-indicator">LVL 00</div>
            </div>

            <div class="flex-grow overflow-y-auto p-6 md:p-12">
                <div class="max-w-2xl mx-auto w-full">
                    <div id="question-box">
                        <div id="category-tag" class="inline-block px-3 py-1 bg-blue-500/10 text-blue-400 rounded-lg text-[10px] font-bold uppercase tracking-widest mb-6 border border-blue-500/20">TEMA</div>
                        <h3 id="question-text" class="text-xl md:text-3xl font-medium mb-10 leading-snug text-slate-100">Cargando...</h3>
                        
                        <div id="options-grid" class="grid grid-cols-1 gap-4">
                            <!-- Opciones -->
                        </div>

                        <div id="explanation" class="hidden explanation-box mt-8 p-6 rounded-2xl bg-slate-900/50 border border-white/5">
                            <h4 class="text-xs font-bold text-slate-400 uppercase mb-2">Fundamento Técnico</h4>
                            <p id="explanation-text" class="text-sm text-slate-300 leading-relaxed"></p>
                        </div>
                    </div>
                </div>
            </div>

            <footer class="p-6 glass border-t border-white/5">
                <div class="max-w-2xl mx-auto">
                    <button id="btn-next" onclick="handleMainAction()" disabled
                            class="w-full py-5 bg-slate-800 text-slate-500 rounded-2xl font-black text-lg transition-all flex items-center justify-center gap-3 tracking-widest uppercase">
                        Comprobar Respuesta
                    </button>
                </div>
            </footer>
        </section>
    </main>

    <!-- Modal de Recarga -->
    <div id="life-modal" class="fixed inset-0 z-[100] bg-slate-950/95 hidden items-center justify-center p-6 backdrop-blur-xl">
        <div class="bg-slate-900 border border-white/10 rounded-[2.5rem] p-10 max-w-sm w-full text-center shadow-2xl">
            <div class="w-24 h-24 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-8 border border-red-500/20 shadow-inner">
                <i class="fas fa-bolt-lightning text-4xl"></i>
            </div>
            <h2 class="text-2xl font-black mb-3">SISTEMA OFFLINE</h2>
            <p class="text-slate-400 text-sm mb-10 leading-relaxed">Energía agotada. Adquiere una recarga de celdas para continuar con la capacitación inmediata.</p>
            
            <div id="paypal-container-V2J2E7EYWRR2U" class="mb-6"></div>
            
            <button onclick="closeLifeModal()" class="text-slate-500 text-xs font-bold hover:text-white transition-colors uppercase tracking-[0.2em]">
                Cerrar Protocolo
            </button>
        </div>
    </div>

    <script>
        // --- BASE DE DATOS COMPLETA ---
        const database = [
            { id: 1, nivel: "básico", tema: "Ley de Ohm", pregunta: "En un resistor de 4.7 kΩ circula una corriente de 2.5 mA. ¿Cuál es la caída de tensión medida en sus terminales?", opciones: ["1.175 V", "11.75 V", "117.5 V", "1.175 mV"], respuesta: 1, explicacion: "V = I * R: 0.0025 A * 4700 Ω = 11.75 V." },
            { id: 2, nivel: "básico", tema: "Circuitos serie/paralelo", pregunta: "Se conectan tres resistores de 100 Ω en paralelo. ¿Cuál es la resistencia equivalente del conjunto?", opciones: ["300 Ω", "100 Ω", "33.33 Ω", "0.03 Ω"], respuesta: 2, explicacion: "Req = R / n. En este caso, 100 / 3 = 33.33 Ω." },
            { id: 3, nivel: "básico", tema: "Capacitores", pregunta: "¿Cuál es la capacitancia equivalente de dos capacitores de 10 µF conectados en serie?", opciones: ["20 µF", "10 µF", "5 µF", "1 µF"], respuesta: 2, explicacion: "Ceq = (C1 * C2) / (C1 + C2) = 100 / 20 = 5 µF." },
            { id: 4, nivel: "básico", tema: "Inductores", pregunta: "¿Qué sucede con la reactancia inductiva (XL) de una bobina si la frecuencia se duplica?", opciones: ["Se reduce a la mitad", "Permanece constante", "Se cuadruplica", "Se duplica"], respuesta: 3, explicacion: "XL = 2πfL. Al ser proporcional a la frecuencia, si f se duplica, XL también." },
            { id: 5, nivel: "básico", tema: "Diodos", pregunta: "¿Cuál es la tensión de umbral aproximada (Vf) para un diodo de silicio estándar como el 1N4007?", opciones: ["0.3 V", "0.7 V", "1.2 V", "5.0 V"], respuesta: 1, explicacion: "El silicio requiere aprox 0.7 V para vencer la barrera de potencial." },
            { id: 6, nivel: "básico", tema: "Transistores BJT", pregunta: "En un transistor NPN en región activa, ¿cuál es la polarización de sus uniones?", opciones: ["BE inversa, BC directa", "BE directa, BC directa", "BE inversa, BC inversa", "BE directa, BC inversa"], respuesta: 3, explicacion: "Para amplificar, la unión Base-Emisor debe estar en directa y la Base-Colector en inversa." },
            { id: 7, nivel: "básico", tema: "Electrónica digital", pregunta: "¿Cuál es el resultado binario de la suma de 1010 + 0101?", opciones: ["1111", "1000", "10101", "1110"], respuesta: 0, explicacion: "1010 (10) + 0101 (5) = 1111 (15)." },
            { id: 8, nivel: "básico", tema: "Seguridad eléctrica", pregunta: "¿Qué dispositivo protege a las personas contra fugas de corriente a tierra?", opciones: ["Fusible", "Termomagnético", "Interruptor diferencial (GFCI)", "Varistor"], respuesta: 2, explicacion: "El diferencial detecta desequilibrios entre fase y neutro." },
            { id: 9, nivel: "básico", tema: "Instrumentación", pregunta: "Para medir corriente, ¿cómo debe conectarse el amperímetro?", opciones: ["En paralelo fuente", "En serie carga", "En paralelo carga", "Entre chasis y tierra"], respuesta: 1, explicacion: "El amperímetro tiene baja impedancia y debe ser atravesado por la corriente." },
            { id: 10, nivel: "básico", tema: "MOSFET", pregunta: "¿Qué terminal de un MOSFET controla la conducción entre Drenador y Fuente?", opciones: ["Base", "Emisor", "Compuerta (Gate)", "Ánodo"], respuesta: 2, explicacion: "El Gate controla el campo eléctrico del canal." },
            { id: 11, nivel: "intermedio", tema: "Amplificadores operacionales", pregunta: "En un inversor con Rin = 10 kΩ y Rf = 100 kΩ, ¿cuál es la ganancia (Av)?", opciones: ["10", "-10", "11", "-0.1"], respuesta: 1, explicacion: "Av = -Rf / Rin = -100k / 10k = -10." },
            { id: 12, nivel: "intermedio", tema: "Transistores BJT", pregunta: "Si β = 150 e Ib = 20 µA, ¿cuál es Ic?", opciones: ["3 mA", "30 mA", "0.3 mA", "1.5 mA"], respuesta: 0, explicacion: "Ic = β * Ib = 150 * 20µA = 3 mA." },
            { id: 13, nivel: "intermedio", tema: "Diodos", pregunta: "¿Qué parámetro define la máxima tensión inversa soportable por un diodo?", opciones: ["Vf", "Ir", "PRV / PIV", "Vgamma"], respuesta: 2, explicacion: "Peak Inverse Voltage es el límite en polarización inversa." },
            { id: 14, nivel: "intermedio", tema: "Circuitos", pregunta: "Divisor de tensión: Vin=12V, R1=2kΩ, R2=1kΩ. ¿Vout en R2?", opciones: ["8 V", "4 V", "6 V", "2 V"], respuesta: 1, explicacion: "Vout = 12 * (1k / 3k) = 4 V." },
            { id: 15, nivel: "intermedio", tema: "Digital", pregunta: "¿Función lógica que da '0' solo cuando todas sus entradas son '1'?", opciones: ["AND", "OR", "NAND", "NOR"], respuesta: 2, explicacion: "NAND es el inverso de AND." },
            { id: 16, nivel: "intermedio", tema: "Capacitores", pregunta: "¿Constante τ de un circuito RC con R = 47 kΩ y C = 100 µF?", opciones: ["4.7 s", "0.47 s", "47 s", "470 ms"], respuesta: 0, explicacion: "τ = R * C = 47000 * 0.0001 = 4.7 s." },
            { id: 17, nivel: "intermedio", tema: "Inductores", pregunta: "Transformador ideal Np=500, Ns=50. Si Vp=230V, ¿Vs?", opciones: ["2300 V", "23 V", "46 V", "115 V"], respuesta: 1, explicacion: "Vs = 230 * (50/500) = 23 V." },
            { id: 18, nivel: "intermedio", tema: "MOSFET", pregunta: "¿Qué ocurre en un MOSFET de enriquecimiento cuando Vgs < Vth?", opciones: ["Saturación", "Corte", "Región Óhmica", "Avalancha"], respuesta: 1, explicacion: "Sin tensión de umbral, el dispositivo no conduce." },
            { id: 19, nivel: "intermedio", tema: "Instrumentación", pregunta: "¿Función del Trigger en un osciloscopio?", opciones: ["Amplitud", "Base tiempo", "Estabilizar visualización", "Medir R"], respuesta: 2, explicacion: "Sincroniza el barrido con un punto de la señal." },
            { id: 20, nivel: "intermedio", tema: "Seguridad", pregunta: "¿Resistencia de tierra máxima recomendada residencial (NEC)?", opciones: ["1000 Ω", "100 Ω", "25 Ω", "1 Ω"], respuesta: 2, explicacion: "25 Ω es el estándar para disipación segura." }
            // Los siguientes 80 niveles usarían un generador de variantes técnicas similares.
        ];

        // --- ESTADO DEL JUEGO ---
        let state = {
            lives: 3,
            stars: parseInt(localStorage.getItem('electro_pro_stars')) || 0,
            progress: parseInt(localStorage.getItem('electro_pro_prog')) || 1,
            currentLevel: null,
            selectedIdx: null,
            isAnswering: false
        };

        // --- RENDERIZADO DEL MAPA ---
        function renderMap() {
            const container = document.getElementById('levels-container');
            container.innerHTML = '';

            for (let i = 1; i <= 100; i++) {
                const node = document.createElement('div');
                const isLocked = i > state.progress;
                const isDone = i < state.progress;
                const isNext = i === state.progress;

                node.className = `level-node rounded-2xl flex items-center justify-center font-bold text-lg 
                                  ${isLocked ? 'locked bg-slate-800' : 'cursor-pointer'} 
                                  ${isDone ? 'completed' : ''} 
                                  ${isNext ? 'current' : 'text-slate-500 bg-slate-800/50'}`;
                
                node.innerHTML = isDone ? '<i class="fas fa-check"></i>' : (isLocked ? '<i class="fas fa-lock text-sm"></i>' : i);
                
                // Efecto de zigzag premium
                const offset = Math.sin(i * 0.9) * 50;
                node.style.transform = `translateX(${offset}px)`;

                if (!isLocked) node.onclick = () => startQuiz(i);
                container.appendChild(node);
            }
        }

        // --- CONTROLADOR DE QUIZ ---
        function startQuiz(id) {
            if (state.lives <= 0) {
                showLifeModal();
                return;
            }

            // Fallback para niveles no definidos aún en el demo
            state.currentLevel = database.find(l => l.id === id) || {
                ...database[0], 
                id: id, 
                pregunta: `Pregunta técnica avanzada de nivel ${id} (Módulo de expansión en desarrollo).`,
                opciones: ["Opción A", "Opción B", "Opción C", "Opción D"],
                respuesta: 0
            };

            state.selectedIdx = null;
            state.isAnswering = false;

            document.getElementById('view-map').classList.add('hidden');
            document.getElementById('view-quiz').classList.remove('hidden');
            document.getElementById('explanation').classList.add('hidden');
            
            renderQuizContent();
        }

        function renderQuizContent() {
            const q = state.currentLevel;
            document.getElementById('question-text').innerText = q.pregunta;
            document.getElementById('category-tag').innerText = q.tema;
            document.getElementById('level-indicator').innerText = `LVL ${q.id.toString().padStart(2, '0')}`;
            document.getElementById('quiz-bar').style.width = `${(q.id / 100) * 100}%`;

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';

            q.opciones.forEach((opt, i) => {
                const card = document.createElement('div');
                card.className = "option-card glass p-5 rounded-2xl cursor-pointer flex items-center gap-4 text-slate-300 font-medium";
                card.innerHTML = `
                    <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center text-xs font-mono border border-white/10">${i + 1}</div>
                    <span>${opt}</span>
                `;
                card.onclick = () => selectOption(i);
                grid.appendChild(card);
            });

            resetNextBtn();
        }

        function selectOption(idx) {
            if (state.isAnswering) return;
            state.selectedIdx = idx;
            
            document.querySelectorAll('.option-card').forEach((c, i) => {
                c.classList.toggle('selected', i === idx);
            });

            const btn = document.getElementById('btn-next');
            btn.disabled = false;
            btn.classList.replace('bg-slate-800', 'bg-blue-600');
            btn.classList.replace('text-slate-500', 'text-white');
        }

        function handleMainAction() {
            if (!state.isAnswering) {
                checkAnswer();
            } else {
                if (state.lives > 0) {
                    if (state.selectedIdx === state.currentLevel.respuesta) {
                        exitQuiz();
                    } else {
                        startQuiz(state.currentLevel.id); // Reintentar mismo
                    }
                } else {
                    exitQuiz();
                }
            }
        }

        function checkAnswer() {
            state.isAnswering = true;
            const isCorrect = state.selectedIdx === state.currentLevel.respuesta;
            const cards = document.querySelectorAll('.option-card');
            const btn = document.getElementById('btn-next');

            cards[state.selectedIdx].classList.add(isCorrect ? 'correct' : 'wrong');
            if (!isCorrect) cards[state.currentLevel.respuesta].classList.add('correct');

            // Mostrar explicación
            document.getElementById('explanation-text').innerText = state.currentLevel.explicacion;
            document.getElementById('explanation').classList.remove('hidden');

            if (isCorrect) {
                confetti({ particleCount: 50, spread: 60, colors: ['#3b82f6', '#10b981'] });
                if (state.currentLevel.id === state.progress) {
                    state.progress++;
                    state.stars += 25;
                    save();
                }
                btn.innerText = "Siguiente Nivel";
                btn.classList.replace('bg-blue-600', 'bg-emerald-600');
            } else {
                state.lives--;
                updateHeader();
                btn.innerText = state.lives > 0 ? "Reintentar Desafío" : "Sin Energía";
                btn.classList.replace('bg-blue-600', 'bg-red-600');
            }
        }

        function resetNextBtn() {
            const btn = document.getElementById('btn-next');
            btn.innerText = "Comprobar Respuesta";
            btn.disabled = true;
            btn.className = "w-full py-5 bg-slate-800 text-slate-500 rounded-2xl font-black text-lg transition-all flex items-center justify-center gap-3 tracking-widest uppercase";
        }

        function exitQuiz() {
            document.getElementById('view-quiz').classList.add('hidden');
            document.getElementById('view-map').classList.remove('hidden');
            renderMap();
        }

        function updateHeader() {
            document.getElementById('life-count').innerText = state.lives;
            document.getElementById('star-count').innerText = state.stars;
            if (state.lives <= 0) showLifeModal();
        }

        function save() {
            localStorage.setItem('electro_pro_prog', state.progress);
            localStorage.setItem('electro_pro_stars', state.stars);
            updateHeader();
        }

        function showLifeModal() {
            document.getElementById('life-modal').style.display = 'flex';
            if (!document.querySelector('#paypal-container-V2J2E7EYWRR2U iframe')) {
                PayPal.HostedButtons({ hostedButtonId: "V2J2E7EYWRR2U" }).render("#paypal-container-V2J2E7EYWRR2U");
            }
        }

        function closeLifeModal() {
            document.getElementById('life-modal').style.display = 'none';
        }

        window.onload = () => {
            renderMap();
            updateHeader();
        };
    </script>
</body>
</html>
