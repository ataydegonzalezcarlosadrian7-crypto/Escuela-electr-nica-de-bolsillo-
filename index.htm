  { id: 76, type: "multiple", q: "Un filtro pasa bajas frecuencias permite:", options: ["Pasar altas frecuencias", "Pasar bajas frecuencias", "Bloquear DC", "Aumentar voltaje"], correct: 1, why: "Permite pasar frecuencias bajas y atenúa las altas." },

  { id: 78, type: "fill", q: "La señal de referencia para sincronización se llama ___", correct: "clock", why: "El clock marca la frecuencia de sincronización en circuitos digitales." },

  { id: 82, type: "fill", q: "El lenguaje más común para programar microcontroladores es ___", correct: "C", why: "C es estándar para sistemas embebidos." },
  { id: 83, type: "truefalse", q: "Arduino es un ejemplo de plataforma de prototipado.", correct: true, why: "Arduino permite desarrollar y programar microcontroladores fácilmente." },
  { id: 84, type: "multiple", q: "¿Qué significa GPIO?", options: ["Entrada y salida de propósito general", "Puerto de internet", "Gestor de potencia", "Oscilador interno"], correct: 0, why: "General Purpose Input/Output son los pines configurables." },

  { id: 93, type: "truefalse", q: "Un servomotor puede controlar su posición angular con precisión.", correct: true, why: "Usa retroalimentación interna para mantener un ángulo." },

  { id: 96, type: "multiple", q: "¿Qué componente permite controlar cargas AC con señales DC?", options: ["Relé", "Condensador", "Inductor", "Zener"], correct: 0, why: "El relé electromecánico aísla y conmuta cargas de potencia." },
  { id: 97, type: "truefalse", q: "Un MOSFET es un transistor controlado por voltaje.", correct: true, why: "Su compuerta (Gate) responde a la tensión aplicada." },
  { id: 98, type: "fill", q: "El componente que reduce o eleva el voltaje AC se llama ___", correct: "transformador", why: "Usa inducción magnética para cambiar niveles de AC." },
  { id: 99, type: "multiple", q: "¿Qué técnica se usa para controlar la velocidad de un motor DC?", options: ["ADC", "PWM", "AM", "Lógica difusa"], correct: 1, why: "Pulse Width Modulation varía el ciclo de trabajo." },

           for(let i = 21; i <= 100; i++) {
            let base = bases[i % bases.length];
            PREGUNTAS_BANCO.push({
                id: i,
                q: `[Nivel ${i}] - ${base.t}: ${base.q}`,
                opts: base.o,
                ans: base.a,
                note: base.n
            });
        }

        let state = {
            xp: parseInt(localStorage.getItem('master_xp')) || 0,
            lives: parseInt(localStorage.getItem('master_lives')) || 5,
            progress: parseInt(localStorage.getItem('master_progress')) || 1,
            selected: null,
            activeQ: null
        };

        function save() {
            localStorage.setItem('master_xp', state.xp);
            localStorage.setItem('master_lives', state.lives);
            localStorage.setItem('master_progress', state.progress);
        }

        function updateStats() {
            document.getElementById('stat-xp').innerText = state.xp;
            document.getElementById('stat-lives').innerText = state.lives;
            if(state.lives <= 0) showLifeModal();
        }

        function renderMap() {
            const container = document.getElementById('map-container');
            container.innerHTML = '<svg id="path-svg" class="path-svg"></svg>';
            const svg = document.getElementById('path-svg');
            let points = [];

            PREGUNTAS_BANCO.forEach((q, i) => {
                const row = document.createElement('div');
                row.className = "node-row";
                const offset = Math.sin(i * 0.9) * 80;
                
                const node = document.createElement('div');
                const isLocked = q.id > state.progress;
                const isDone = q.id < state.progress;

                node.className = `node ${isLocked ? 'node-locked' : (isDone ? 'node-done' : 'node-active')}`;
                node.style.transform = `translateX(${offset}px)`;
                node.innerHTML = isDone ? '<i class="fas fa-check text-xl"></i>' : (isLocked ? '<i class="fas fa-lock text-sm opacity-40"></i>' : `<span class="font-black text-2xl">${q.id}</span>`);
                
                if(!isLocked) node.onclick = () => startQuiz(q);
                
                row.appendChild(node);
                container.appendChild(row);
                points.push({ x: offset + (window.innerWidth / 2), y: (i * 110) + 150 });
            });

            let d = `M ${points[0].x} ${points[0].y}`;
            for(let i=1; i<points.length; i++){
                const midY = (points[i-1].y + points[i].y) / 2;
                d += ` C ${points[i-1].x} ${midY}, ${points[i].x} ${midY}, ${points[i].x} ${points[i].y}`;
            }
            svg.innerHTML = `<path d="${d}" fill="none" stroke="#2d3748" stroke-width="12" stroke-linecap="round" />`;
            svg.style.height = (points.length * 110) + 300 + 'px';
            
            // Auto-scroll al nivel actual (mejorado)
            if(state.progress > 4) {
                const scrollTarget = (state.progress - 4) * 110;
                window.scrollTo({ top: scrollTarget, behavior: 'smooth' });
            }
        }

        function startQuiz(q) {
            if(state.lives <= 0) return showLifeModal();
            state.activeQ = q;
            state.selected = null;
            document.getElementById('view-map').classList.add('hidden');
            document.getElementById('view-quiz').classList.remove('hidden');
            
            const container = document.getElementById('question-container');
            container.innerHTML = `
                <div class="animate-in fade-in slide-in-from-bottom-6 duration-300">
                    <h2 class="text-2xl font-black text-white leading-tight mb-8">${q.q}</h2>
                    <div class="space-y-4">
                        ${q.opts.map((opt, i) => `
                            <button onclick="selectOpt(${i})" id="opt-${i}" class="option-card w-full p-5 rounded-2xl flex items-center gap-4 text-left">
                                <span class="w-8 h-8 rounded-lg bg-slate-800 border border-slate-700 flex items-center justify-center font-bold text-slate-500">${i+1}</span>
                                <span class="font-bold text-slate-200 text-lg">${opt}</span>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('quiz-bar').style.width = `${(q.id / 100) * 100}%`;
        }

        function selectOpt(i) {
            state.selected = i;
            document.querySelectorAll('.option-card').forEach(el => el.classList.remove('selected'));
            document.getElementById(`opt-${i}`).classList.add('selected');
            const btn = document.getElementById('btn-check');
            btn.disabled = false;
            btn.classList.replace('bg-slate-700', 'bg-blue-600');
            btn.classList.replace('text-slate-400', 'text-white');
            btn.classList.remove('cursor-not-allowed');
        }

        document.getElementById('btn-check').onclick = () => {
            const isCorrect = state.selected === state.activeQ.ans;
            const panel = document.getElementById('feedback-panel');
            const icon = document.getElementById('fb-icon');
            
            if (isCorrect) {
                document.getElementById('fb-content').style.borderColor = "#58cc02";
                icon.className = "w-12 h-12 rounded-xl bg-[#58cc02] flex items-center justify-center text-white";
                icon.innerHTML = '<i class="fas fa-check"></i>';
                document.getElementById('fb-title').innerText = "¡Excelente!";
                document.getElementById('fb-title').className = "font-black text-2xl text-[#58cc02]";
                document.getElementById('fb-desc').innerText = state.activeQ.note;
                state.xp += 10;
                if(state.activeQ.id === state.progress) state.progress++;
                confetti({ particleCount: 80, spread: 60, origin: { y: 0.8 }, colors: ['#58cc02', '#3b82f6'] });
            } else {
                document.getElementById('fb-content').style.borderColor = "#ff4b4b";
                icon.className = "w-12 h-12 rounded-xl bg-[#ff4b4b] flex items-center justify-center text-white";
                icon.innerHTML = '<i class="fas fa-times"></i>';
                document.getElementById('fb-title').innerText = "Vuelve a intentarlo";
                document.getElementById('fb-title').className = "font-black text-2xl text-[#ff4b4b]";
                document.getElementById('fb-desc').innerText = "Respuesta incorrecta. Perdiste 1 núcleo de energía.";
                state.lives--;
            }
            save();
            updateStats();
            panel.classList.add('feedback-show');
            document.getElementById('btn-next').className = `w-full py-5 text-white rounded-2xl font-black uppercase tracking-widest ${isCorrect ? 'bg-[#58cc02]' : 'bg-[#ff4b4b]'}`;
        };

        document.getElementById('btn-next').onclick = () => {
            document.getElementById('feedback-panel').classList.remove('feedback-show');
            exitQuiz();
        };

        function exitQuiz() {
            document.getElementById('view-quiz').classList.add('hidden');
            document.getElementById('view-map').classList.remove('hidden');
            renderMap();
        }

        function showLifeModal() {
            document.getElementById('life-modal').style.display = 'flex';
            if (!document.querySelector('#paypal-container-V2J2E7EYWRR2U iframe')) {
                PayPal.HostedButtons({ hostedButtonId: "V2J2E7EYWRR2U" }).render("#paypal-container-V2J2E7EYWRR2U");
            }
        }

        window.onload = () => {
            updateStats();
            renderMap();
        };
    </script>
</body>
</html>
